<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Registrieren - Room8</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .app-container {
      padding-bottom: 0;
    }

    /* Pattern: Magic UI BlurFade */
    @keyframes blurFadeIn {
      from { opacity: 0; filter: blur(8px); transform: translateY(8px); }
      to { opacity: 1; filter: blur(0px); transform: translateY(0); }
    }
    @keyframes shimmerSlide {
      0%, 100% { left: -100%; }
      50% { left: 100%; }
    }

    /* Animated Mesh Gradient Background */
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .app-content::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(-45deg, #EFF6FF, #DBEAFE, #F0F9FF, #E0F2FE, #EFF6FF);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      z-index: -1;
    }

    .register-container {
      max-width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      border-radius: 0;
      box-shadow: none;
    }

    .register-header {
      text-align: center;
      margin-bottom: 1.5rem;
      animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .register-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
      position: relative;
      overflow: hidden;
    }

    /* Pattern: Magic UI ShineBorder */
    .register-logo::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent 50%, rgba(255,255,255,0.1));
      pointer-events: none;
    }

    .register-logo svg {
      width: 30px;
      height: 30px;
      color: white;
      position: relative;
      z-index: 1;
    }

    .register-header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .register-header p {
      color: var(--text-light);
      font-size: 0.9rem;
    }

    /* Formular verschoenern */
    #registerForm {
      animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both;
    }
    #registerForm .form-group input[type="text"],
    #registerForm .form-group input[type="email"],
    #registerForm .form-group input[type="password"] {
      border-radius: 14px;
      padding: 0.9rem 1rem;
      border: 1.5px solid #E5E7EB;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #FAFAFA;
    }
    #registerForm .form-group input:focus {
      border-color: #3B82F6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
      background: #fff;
    }
    #registerForm .form-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    /* Pattern: Magic UI ShimmerButton */
    .register-btn {
      width: 100%;
      padding: 0.95rem 1.5rem;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.35);
      position: relative;
      overflow: hidden;
    }
    .register-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmerSlide 3s ease-in-out infinite;
    }
    .register-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 12px rgba(59, 130, 246, 0.3);
    }
    .register-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .register-btn:disabled::after { animation: none; }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      padding: 1.25rem;
      color: var(--text-light);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
      font-size: 0.9rem;
      animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
    }

    .login-link a {
      color: #3B82F6;
      text-decoration: none;
      font-weight: 700;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    #msg {
      margin-top: 1rem;
      text-align: center;
      font-weight: 600;
      padding: 1rem;
      border-radius: 14px;
    }

    #msg:empty {
      display: none;
    }

    #msg.success {
      background: rgba(16, 185, 129, 0.1);
      color: #059669;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    #msg.error {
      background: rgba(239, 68, 68, 0.08);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.15);
    }

    .info-box {
      background: rgba(59, 130, 246, 0.06);
      border: 1px solid rgba(59, 130, 246, 0.15);
      padding: 1.25rem;
      border-radius: 14px;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #1e40af;
      line-height: 1.6;
    }

    .checkbox-container {
      background: #FAFAFA;
      padding: 1rem;
      border-radius: 14px;
      border: 1.5px solid #E5E7EB;
    }

    .checkbox-container input[type="checkbox"] {
      width: 22px !important;
      height: 22px !important;
      accent-color: #3B82F6;
    }

    /* Social Login Buttons */
    .social-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.15s both;
    }
    .social-divider::before, .social-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E7EB;
    }
    .social-divider span {
      font-size: 0.8rem;
      color: #9CA3AF;
      white-space: nowrap;
    }
    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      border: 1.5px solid #E5E7EB;
      background: #fff;
      color: #374151;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .social-btn:active { transform: scale(0.98); }
    .social-btn:hover { border-color: #D1D5DB; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .social-btn.google-btn:hover { background: #F8F9FA; }
    .social-btn.apple-btn { background: #000; color: #fff; border-color: #000; }
    .social-btn.apple-btn:hover { background: #1a1a1a; }

    @media (prefers-reduced-motion: reduce) {
      .register-header, #registerForm, .login-link { animation: none; opacity: 1; }
      .register-btn::after { animation: none; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header class="app-header">
      <a href="index.html" class="back-arrow">&#8592;</a>
      <h1 data-i18n="nav_register">Registrieren</h1>
    </header>
    
    <main class="app-content">
      <div class="register-container">
        <div class="register-header">
          <div class="register-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <line x1="19" y1="8" x2="19" y2="14"></line>
              <line x1="22" y1="11" x2="16" y2="11"></line>
            </svg>
          </div>
          <h1 data-i18n="register_join">Tritt Room8 bei</h1>
          <p data-i18n="register_subtitle">Erstelle dein Konto um auf den Studenten-Marktplatz zuzugreifen</p>
        </div>

        <form id="registerForm">
          <div class="form-group">
            <label for="username" data-i18n="auth_username">Benutzername</label>
            <input
              type="text"
              id="username"
              name="username"
              required
              minlength="3"
              autocomplete="username"
              data-i18n-placeholder="register_username_placeholder"
              placeholder="Wähle einen Benutzernamen"
            >
          </div>

          <div class="form-group">
            <label for="email" data-i18n="register_email_label">E-Mail-Adresse</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              autocomplete="email"
              data-i18n-placeholder="register_email_placeholder"
              placeholder="deine.email@beispiel.de"
            >
            <small style="color: #6b7280; font-size: 0.85rem;" data-i18n="register_email_hint">
              Du kannst jede E-Mail-Adresse verwenden
            </small>
          </div>

          <div class="form-group">
            <label for="password" data-i18n="register_password_label">Passwort (min. 6 Zeichen)</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              minlength="6"
              autocomplete="new-password"
              data-i18n-placeholder="register_password_placeholder"
              placeholder="Wähle ein starkes Passwort"
            >
          </div>

          <div class="form-group">
            <label for="passwordConfirm" data-i18n="auth_confirm_password">Passwort bestätigen</label>
            <input
              type="password"
              id="passwordConfirm"
              name="passwordConfirm"
              required
              minlength="6"
              autocomplete="new-password"
              data-i18n-placeholder="register_password_confirm_placeholder"
              placeholder="Passwort wiederholen"
            >
          </div>

          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label class="checkbox-container" style="display: flex; align-items: flex-start; gap: 0.75rem; cursor: pointer; font-weight: normal; font-size: 0.9rem; color: #4b5563;">
              <input
                type="checkbox"
                id="acceptTerms"
                name="acceptTerms"
                required
                style="width: 20px; height: 20px; margin-top: 2px; accent-color: var(--primary-color); cursor: pointer; flex-shrink: 0;"
              >
              <span>
                <span data-i18n="register_terms_agree">Ich akzeptiere die</span>
                <a href="nutzungsbedingungen.html" target="_blank" style="color: var(--primary-color); text-decoration: underline;" data-i18n="register_terms_link">Nutzungsbedingungen (AGB)</a>
                <span data-i18n="register_terms_and">und die</span>
                <a href="datenschutz.html" target="_blank" style="color: var(--primary-color); text-decoration: underline;" data-i18n="register_privacy_link">Datenschutzerklärung</a>
              </span>
            </label>
          </div>

          <button type="submit" class="register-btn" id="registerBtn" data-i18n="register_btn_create">
            Konto erstellen
          </button>

          <p id="msg"></p>
        </form>

        <!-- Social Login -->
        <div class="social-divider"><span>oder direkt mit</span></div>

        <div class="social-buttons">
          <button type="button" class="social-btn google-btn" id="googleRegBtn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Mit Google registrieren
          </button>

          <button type="button" class="social-btn apple-btn" id="appleRegBtn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
              <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
            </svg>
            Mit Apple registrieren
          </button>
        </div>

        <div class="login-link">
          <span data-i18n="auth_have_account">Bereits ein Konto?</span> <a href="login.html" data-i18n="auth_login_link">Anmelden</a>
        </div>
      </div>
    </main>
    
    <footer class="app-footer-nav" id="app-footer-nav"></footer>
  </div>

  <script src="lib/supabase.min.js"></script>
  <script src="config.js"></script>
<script src="session-cache.js"></script>
  <script>
    // Supabase Client - Direkte Initialisierung
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var form = document.getElementById('registerForm');
    var msg = document.getElementById('msg');
    var registerBtn = document.getElementById('registerBtn');

    function setMsg(text, isSuccess) {
      msg.textContent = text;
      msg.className = isSuccess ? 'success' : 'error';
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      var username = document.getElementById('username').value.trim();
      var email = document.getElementById('email').value.trim().toLowerCase();
      var password = document.getElementById('password').value;
      var passwordConfirm = document.getElementById('passwordConfirm').value;

      var lang = localStorage.getItem('room8_language') || 'en';
      var messages = {
        de: {
          mismatch: 'Passwörter stimmen nicht überein!',
          short: 'Passwort muss mindestens 6 Zeichen haben!',
          terms: 'Bitte akzeptiere die Nutzungsbedingungen und Datenschutzerklärung.',
          creating: 'Konto wird erstellt...',
          success: 'Konto erstellt! Bitte überprüfe deine E-Mail.',
          already: 'Du hast bereits ein Konto mit dieser E-Mail! Bitte einfach einloggen.',
          invalid: 'Bitte gib eine gültige E-Mail-Adresse ein.',
          failed: 'Registrierung fehlgeschlagen: ',
          checkEmail: 'Überprüfe deine E-Mail!',
          sentTo: 'Wir haben einen Bestätigungslink an',
          clickLink: 'gesendet. Klicke auf den Link um dein Konto zu aktivieren.'
        },
        en: {
          mismatch: 'Passwords do not match!',
          short: 'Password must be at least 6 characters!',
          terms: 'Please accept the Terms of Use and Privacy Policy.',
          creating: 'Creating account...',
          success: 'Account created! Please check your email to confirm your address.',
          already: 'You already have an account with this email! Just log in.',
          invalid: 'Please enter a valid email address.',
          failed: 'Registration failed: ',
          checkEmail: 'Check your email!',
          sentTo: 'We sent a confirmation link to',
          clickLink: 'Click the link to activate your account.'
        }
      };
      var m = messages[lang] || messages.de;

      var acceptTerms = document.getElementById('acceptTerms').checked;
      if (!acceptTerms) {
        setMsg(m.terms, false);
        return;
      }

      if (password !== passwordConfirm) {
        setMsg(m.mismatch, false);
        return;
      }

      if (password.length < 6) {
        setMsg(m.short, false);
        return;
      }

      registerBtn.disabled = true;
      setMsg(m.creating, true);

      sb.auth.signUp({
        email: email,
        password: password,
        options: {
          data: {
            username: username
          }
        }
      })
      .then(function(response) {
        if (response.error) {
          throw response.error;
        }

        // Supabase gibt bei bereits existierender Email ein User-Objekt
        // mit leerer identities-Liste zurueck statt einem Fehler
        var user = response.data && response.data.user;
        if (user && user.identities && user.identities.length === 0) {
          throw { message: 'already registered', _alreadyExists: true };
        }

        setMsg(m.success, true);
        form.reset();
        registerBtn.disabled = true;

        var infoBox = document.createElement('div');
        infoBox.className = 'info-box';
        var strong1 = document.createElement('strong');
        strong1.textContent = m.checkEmail;
        var strong2 = document.createElement('strong');
        strong2.textContent = email;
        infoBox.appendChild(strong1);
        infoBox.appendChild(document.createElement('br'));
        infoBox.appendChild(document.createTextNode(m.sentTo + ' '));
        infoBox.appendChild(strong2);
        infoBox.appendChild(document.createElement('br'));
        infoBox.appendChild(document.createTextNode(m.clickLink));
        msg.after(infoBox);
      })
      .catch(function(error) {
        console.error('Registration error:', error);

        var isAlready = (error._alreadyExists) ||
          (error.message && error.message.indexOf('already registered') !== -1);

        if (isAlready) {
          msg.textContent = '';
          msg.className = 'error';
          msg.appendChild(document.createTextNode(m.already + ' '));
          var loginLink = document.createElement('a');
          loginLink.href = 'login.html';
          loginLink.textContent = lang === 'de' ? 'Zum Login' : 'Go to Login';
          loginLink.style.cssText = 'color:#3B82F6;font-weight:700;text-decoration:underline;';
          msg.appendChild(loginLink);
        } else if (error.message && error.message.indexOf('Invalid email') !== -1) {
          setMsg(m.invalid, false);
        } else {
          setMsg(m.failed + (error.message || 'Unknown error'), false);
        }

        registerBtn.disabled = false;
      });
    });
  </script>
  <script>
    // Social Login: Google (Register)
    document.getElementById('googleRegBtn').addEventListener('click', async function() {
      try {
        this.disabled = true;
        this.style.opacity = '0.7';
        var { data, error } = await sb.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + '/dashboard.html' }
        });
        if (error) throw error;
      } catch(err) {
        console.error('Google Register Error:', err);
        Room8UI.error('Google Anmeldung fehlgeschlagen. Bitte versuche es erneut.');
        this.disabled = false;
        this.style.opacity = '1';
      }
    });

    // Social Login: Apple (Register)
    document.getElementById('appleRegBtn').addEventListener('click', async function() {
      try {
        this.disabled = true;
        this.style.opacity = '0.7';
        var { data, error } = await sb.auth.signInWithOAuth({
          provider: 'apple',
          options: { redirectTo: window.location.origin + '/dashboard.html' }
        });
        if (error) throw error;
      } catch(err) {
        console.error('Apple Register Error:', err);
        Room8UI.error('Apple Anmeldung fehlgeschlagen. Bitte versuche es erneut.');
        this.disabled = false;
        this.style.opacity = '1';
      }
    });
  </script>

  <script src="translations.js"></script>
  <script>
    // Fix back-arrow for Capacitor iOS
    document.querySelectorAll('.back-arrow, a[href="index.html"]').forEach(function(arrow) {
      arrow.addEventListener('click', function(e) {
        e.preventDefault();
        var href = arrow.getAttribute('href');
        if (href && href !== '#') {
          try {
            window.location.href = href;
          } catch(err) {
            window.location.replace(href);
          }
        } else {
          window.history.back();
        }
      });
    });
  </script>
</body>
</html>
