<!DOCTYPE html>
<html lang="de">
<head>
    <script src="sentry-init.js"></script>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">    <title>Coupon - Room8</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
    <script src="lib/qrcode.min.js"></script>
    <style>
        /* Pattern: Magic UI BlurFade */
        @keyframes blurFadeIn {
            from { opacity: 0; filter: blur(8px); transform: translateY(8px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }
        .coupon-hero { height: 250px; background-color: #FED7AA; position: relative; }
        .coupon-hero img { width: 100%; height: 100%; object-fit: cover; }
        /* Glasmorphismus Content */
        .coupon-content {
            background: rgba(255,255,255,0.95);
            border-radius: 24px 24px 0 0;
            margin-top: -20px;
            position: relative;
            padding: 2rem 1.5rem;
            text-align: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
            animation: blurFadeIn 0.5s ease-out both;
        }
        .discount-big { font-size: 2.5rem; font-weight: 800; color: #EA580C; margin: 1rem 0; letter-spacing: -0.02em; }
        .code-box {
            background: rgba(243,244,246,0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px dashed #D1D5DB;
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 16px;
            font-family: monospace;
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .code-box:active { transform: scale(0.97); }
        /* Redeem-Button (Primary CTA) */
        .redeem-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #EA580C 0%, #DC2626 100%);
            color: #fff;
            border: none;
            padding: 1.1rem 1.5rem;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin: 1.5rem 0 0.75rem;
            box-shadow: 0 4px 14px rgba(234,88,12,0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .redeem-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(234,88,12,0.25); }
        .redeem-btn[disabled] { background: #9CA3AF; cursor: not-allowed; box-shadow: none; }
        .redeemed-badge {
            background: #ECFDF5; color: #047857; border: 1px solid #A7F3D0;
            border-radius: 12px; padding: 0.75rem 1rem; margin: 1.5rem 0 0.5rem;
            font-weight: 600; font-size: 0.95rem;
        }
        /* QR-Modal */
        .qr-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 1rem;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }
        .qr-overlay.open { display: flex; animation: blurFadeIn 0.3s ease-out both; }
        .qr-card {
            background: #fff; border-radius: 24px; padding: 2rem 1.5rem;
            max-width: 360px; width: 100%; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
        }
        .qr-card h3 { margin: 0 0 0.5rem; font-size: 1.2rem; }
        .qr-card .sub { color: #6B7280; font-size: 0.9rem; margin-bottom: 1.25rem; }
        .qr-canvas {
            display: inline-block; padding: 16px; background: #fff;
            border: 4px solid #F3F4F6; border-radius: 16px;
            margin: 0.5rem 0 1rem;
        }
        .qr-canvas img, .qr-canvas canvas { display: block; }
        .qr-meta { font-size: 0.85rem; color: #4B5563; margin: 0.5rem 0; }
        .qr-meta strong { color: #111827; }
        .qr-close {
            background: #F3F4F6; color: #111827; border: none;
            padding: 0.85rem 1.5rem; border-radius: 12px;
            font-weight: 600; cursor: pointer; margin-top: 1rem; width: 100%;
        }
        /* Barrierefreiheit */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header" style="position:absolute; top:0; left:0; width:100%; background:transparent; border:none; box-shadow:none; z-index:10;">
        <a href="javascript:history.back()" class="back-arrow" style="background:rgba(0,0,0,0.3); border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; color:white;">&#8592;</a>
    </header>

    <div class="coupon-hero">
        <img id="heroImg" src="https://via.placeholder.com/400x250" alt="Deal">
    </div>

    <div class="coupon-content">
        <h2 id="companyName" style="color:#6B7280; font-size:0.9rem; text-transform:uppercase; margin-bottom:0.5rem;">Lade...</h2>
        <h1 id="dealTitle" style="font-size:1.5rem; margin:0;"></h1>
        <div class="discount-big" id="discountValue"></div>
        <p id="description" style="color:#4B5563; line-height:1.6;"></p>
        
        <button id="redeemBtn" class="redeem-btn" onclick="openRedeemQR()">QR-Code zum Einlösen anzeigen</button>
        <div id="redeemedBadge" class="redeemed-badge" style="display:none;">Bereits eingelöst</div>

        <div class="code-box" onclick="copyCode()">
            <span id="couponCode">CODE</span>
            <div style="font-size:0.8rem; font-weight:400; color:#9CA3AF; margin-top:0.5rem; letter-spacing:0;">Online-Code · tippen zum Kopieren</div>
        </div>

        <p style="font-size:0.8rem; color:#9CA3AF;">Gültig bis: <span id="validDate">-</span></p>
    </div>
</div>

<!-- QR-Einlöse-Modal -->
<div id="qrOverlay" class="qr-overlay" onclick="closeRedeemQR(event)">
    <div class="qr-card" onclick="event.stopPropagation()">
        <h3>Vor Ort einlösen</h3>
        <p class="sub">Lass den Partner den QR-Code scannen.</p>
        <div class="qr-canvas" id="qrCanvas"></div>
        <p class="qr-meta">Coupon: <strong id="qrCouponTitle">—</strong></p>
        <p class="qr-meta" id="qrLimitInfo" style="display:none;">Pro Konto nur <strong>1× einlösbar</strong>.</p>
        <button class="qr-close" onclick="closeRedeemQR()">Schließen</button>
    </div>
</div>

<script src="lib/supabase.min.js"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script src="session-cache.js"></script>
<script src="room8-ui.js"></script>
<script>
    // Supabase Client - Direkte Initialisierung
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const id = new URLSearchParams(window.location.search).get('id');
    let coupon = null;
    let userId = null;
    let alreadyRedeemed = false;

    async function load() {
        if(!id) return;

        // Auth-State holen (fuer Redeem-Button)
        const { data: sess } = await sb.auth.getSession();
        userId = sess && sess.session && sess.session.user ? sess.session.user.id : null;

        const { data: c } = await sb.from('coupons').select('*, coupon_photos(storage_path)').eq('id', id).single();
        coupon = c;
        if(!coupon) return;

        document.getElementById('companyName').textContent = coupon.business_name || '';
        document.getElementById('dealTitle').textContent = coupon.title || '';
        document.getElementById('discountValue').textContent = coupon.discount_value || '';
        document.getElementById('description').textContent = coupon.description || '';
        document.getElementById('couponCode').textContent = coupon.discount_code || '';
        if(coupon.valid_until) document.getElementById('validDate').textContent = new Date(coupon.valid_until).toLocaleDateString('de-DE');

        if (coupon.coupon_photos && coupon.coupon_photos.length > 0) {
            const { data } = sb.storage.from('listing-images').getPublicUrl(coupon.coupon_photos[0].storage_path);
            document.getElementById('heroImg').src = data.publicUrl;
        }

        // Redeem-Button-Status: schon eingeloest?
        const btn = document.getElementById('redeemBtn');
        const badge = document.getElementById('redeemedBadge');
        if (!userId) {
            btn.textContent = 'Zum Einlösen einloggen';
            btn.onclick = function() { window.location.href = 'login.html'; };
            return;
        }
        if (coupon.usage_limit_per_user) {
            const { count } = await sb.from('coupon_redemptions')
                .select('id', { count: 'exact', head: true })
                .eq('coupon_id', id).eq('user_id', userId);
            if ((count || 0) >= coupon.usage_limit_per_user) {
                alreadyRedeemed = true;
                btn.style.display = 'none';
                badge.style.display = 'block';
            }
        }
    }

    function openRedeemQR() {
        if (!coupon || !userId) return;
        if (alreadyRedeemed) {
            Room8UI.error('Du hast diesen Coupon bereits eingelöst.');
            return;
        }
        // QR-Payload: room8:redeem:<coupon_id>:<user_id>
        const payload = 'room8:redeem:' + coupon.id + ':' + userId;
        const canvas = document.getElementById('qrCanvas');
        canvas.innerHTML = '';
        new QRCode(canvas, {
            text: payload,
            width: 220,
            height: 220,
            colorDark: '#111827',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
        });
        document.getElementById('qrCouponTitle').textContent = coupon.title || '—';
        document.getElementById('qrLimitInfo').style.display = coupon.usage_limit_per_user === 1 ? 'block' : 'none';
        document.getElementById('qrOverlay').classList.add('open');
    }

    function closeRedeemQR(ev) {
        if (ev && ev.target && !ev.target.classList.contains('qr-overlay') && ev.currentTarget !== ev.target) {
            // Klick auf Inhalt → nicht schliessen
            if (ev.target.closest('.qr-card') && !ev.target.classList.contains('qr-close')) return;
        }
        document.getElementById('qrOverlay').classList.remove('open');
    }

    function copyCode() {
        const code = document.getElementById('couponCode').textContent;
        navigator.clipboard.writeText(code);
        Room8UI.success('Code kopiert: ' + code);
        // Hinweis: increment_coupon_redemptions wird NICHT mehr aufgerufen.
        // Zaehler wird ausschliesslich von redeem_coupon RPC gesetzt (Partner-Scan).
    }

    load();
</script>
<script src="notificationBell.js"></script>
</body>
</html>
