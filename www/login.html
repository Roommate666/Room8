<!DOCTYPE html>
<html lang="de">
<head>
    <script src="sentry-init.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>Anmelden - Room8</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .app-container {
      padding-bottom: 0;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
      margin-top: 1rem;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1rem;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.25);
    }

    .login-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .login-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-header p {
      color: var(--text-light);
      font-size: 0.95rem;
    }

    .forgot-password-link {
      display: block;
      text-align: right;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #3B82F6;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .forgot-password-link:hover {
      opacity: 0.8;
    }

    .register-hint {
      text-align: center;
      margin-top: 2rem;
      padding: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-light);
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-radius: var(--border-radius);
      border: 1px solid var(--glass-border);
    }

    .register-hint a {
      color: #3B82F6;
      font-weight: 700;
      text-decoration: none;
    }

    .register-hint a:hover {
      text-decoration: underline;
    }
    /* Override: Einloggen-Button bleibt blau (statt coral aus style.css) */
    .submit-btn {
      background: linear-gradient(135deg, #3B82F6, #2563EB) !important;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.35) !important;
    }
    .submit-btn:hover {
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.45) !important;
    }
    .submit-btn:disabled {
      background: var(--text-muted) !important;
      box-shadow: none !important;
    }

    /* Social Login Styles */
    .social-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .social-divider::before, .social-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E7EB;
    }
    .social-divider span {
      font-size: 0.8rem;
      color: #9CA3AF;
      white-space: nowrap;
    }
    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      border: 1.5px solid #E5E7EB;
      background: #fff;
      color: #374151;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .social-btn:active { transform: scale(0.98); }
    .social-btn:hover { border-color: #D1D5DB; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .social-btn.google-btn:hover { background: #F8F9FA; }
    .social-btn.apple-btn { background: #000; color: #fff; border-color: #000; }
    .social-btn.apple-btn:hover { background: #1a1a1a; }
  </style>
</head>
<body>

  <div class="app-container">
    <header class="app-header">
       <a href="index.html" class="back-arrow">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
       </a>
       <h1>Anmelden</h1>
       <div style="width: 40px;"></div>
    </header>

    <main class="app-content">

      <div class="login-header">
        <div class="login-logo">
          <img src="splash-logo.jpg" alt="Room8 Logo">
        </div>
        <h1 data-i18n="auth_login_title">Willkommen zurück!</h1>
        <p>Logge dich ein, um fortzufahren.</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail" data-i18n="auth_email">E-Mail Adresse</label>
          <input type="email" id="loginEmail" required data-i18n-placeholder="auth_email_placeholder" placeholder="deine@email.de" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="loginPassword" data-i18n="auth_password">Passwort</label>
          <input type="password" id="loginPassword" required data-i18n-placeholder="auth_password_placeholder" placeholder="••••••••" autocomplete="current-password">
          <a href="forgot-password.html" class="forgot-password-link">Passwort vergessen?</a>
        </div>

        <button type="submit" class="submit-btn" id="loginBtn" style="margin-top: 1.5rem;" data-i18n="auth_btn_login">Einloggen</button>
      </form>

      <!-- Social Login -->
      <div class="social-divider"><span>oder direkt mit</span></div>
      <div class="social-buttons">
        <button type="button" class="social-btn google-btn" id="googleLoginBtn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Mit Google anmelden
        </button>
        <button type="button" class="social-btn apple-btn" id="appleLoginBtn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          Mit Apple anmelden
        </button>
      </div>

      <div class="register-hint">
        <span data-i18n="auth_no_account">Noch kein Konto?</span> <a href="register.html" data-i18n="auth_signup_link">Jetzt registrieren</a>
      </div>
    </main>
    
    <footer class="app-footer-nav" id="app-footer-nav"></footer>
  </div>

  <script src="lib/supabase.min.js"></script>
  <script src="config.js"></script>
<script src="session-cache.js"></script>
  <script src="room8-ui.js"></script>
  <script>
    // Supabase Client - Direkte Initialisierung
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var loginBtn = document.getElementById('loginBtn');
    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      if(!sb) {
          Room8UI.error("Verbindungsfehler: Supabase konnte nicht geladen werden.");
          return;
      }

      var email = document.getElementById('loginEmail').value.trim();
      var password = document.getElementById('loginPassword').value;
      
      loginBtn.disabled = true;
      var originalText = loginBtn.textContent;
      loginBtn.textContent = "Wird eingeloggt...";
      
      sb.auth.signInWithPassword({ email: email, password: password })
        .then(async function(response) {
          if (response.error) {
            throw response.error;
          }
          // Rolle pruefen: Partner -> partner-dashboard, sonst -> dashboard
          var uid = response.data.user.id;
          var profileRes = await sb.from('profiles').select('is_partner').eq('id', uid).maybeSingle();
          if (profileRes.data && profileRes.data.is_partner) {
            window.location.href = 'partner-dashboard.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        })
        .catch(function(err) {
          console.error("Login Error:", err);
          var msg = err.message;
          if (msg === 'Invalid login credentials') msg = 'Falsches Passwort oder E-Mail.';
          Room8UI.error('Login fehlgeschlagen: ' + msg);
          
          loginBtn.disabled = false;
          loginBtn.textContent = originalText;
        });
    });
  </script>

  <script src="social-auth.js"></script>
  <script>
    // Social Login: Google (nativ in Capacitor, Web-OAuth-Fallback im Browser)
    document.getElementById('googleLoginBtn').addEventListener('click', async function() {
      var btn = this;
      try {
        btn.disabled = true; btn.style.opacity = '0.7';
        await window.signInWithGoogle();
      } catch(err) {
        console.error('Google Login Error:', err);
        if (window.Room8UI) Room8UI.error('Google Anmeldung fehlgeschlagen: ' + (err.message || ''));
        btn.disabled = false; btn.style.opacity = '1';
      }
    });
    document.getElementById('appleLoginBtn').addEventListener('click', async function() {
      var btn = this;
      try {
        btn.disabled = true; btn.style.opacity = '0.7';
        await window.signInWithApple();
      } catch(err) {
        console.error('Apple Login Error:', err);
        if (window.Room8UI) Room8UI.error('Apple Anmeldung fehlgeschlagen: ' + (err.message || ''));
        btn.disabled = false; btn.style.opacity = '1';
      }
    });
  </script>

  <script src="translations.js"></script>
  <script>
    // Fix back-arrow for Capacitor iOS
    document.querySelectorAll('.back-arrow, a[href="index.html"]').forEach(function(arrow) {
      arrow.addEventListener('click', function(e) {
        e.preventDefault();
        var href = arrow.getAttribute('href');
        if (href && href !== '#') {
          try {
            window.location.href = href;
          } catch(err) {
            window.location.replace(href);
          }
        } else {
          window.history.back();
        }
      });
    });
  </script>
</body>
</html>
