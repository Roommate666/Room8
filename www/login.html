<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>Anmelden - Room8</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .app-container {
      padding-bottom: 0;
    }

    /* Pattern: Magic UI BlurFade */
    @keyframes blurFadeIn {
      from { opacity: 0; filter: blur(8px); transform: translateY(8px); }
      to { opacity: 1; filter: blur(0px); transform: translateY(0); }
    }

    /* Animated Mesh Gradient Background */
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .app-content::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(-45deg, #EFF6FF, #DBEAFE, #F0F9FF, #E0F2FE, #EFF6FF);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      z-index: -1;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
      margin-top: 1rem;
      animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .login-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
      position: relative;
      overflow: hidden;
    }

    /* Pattern: Magic UI ShineBorder - dezenter Glanz auf dem Logo */
    .login-logo::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent 50%, rgba(255,255,255,0.1));
      pointer-events: none;
    }

    .login-logo svg {
      width: 30px;
      height: 30px;
      color: white;
      position: relative;
      z-index: 1;
    }

    .login-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .login-header p {
      color: var(--text-light);
      font-size: 0.95rem;
    }

    /* Form-Felder verschoenern */
    #loginForm {
      animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both;
    }

    #loginForm .form-group input {
      border-radius: 14px;
      padding: 0.9rem 1rem;
      border: 1.5px solid #E5E7EB;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #FAFAFA;
    }
    #loginForm .form-group input:focus {
      border-color: #3B82F6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
      background: #fff;
    }
    #loginForm .form-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    /* Submit-Button - Pattern: Magic UI ShimmerButton */
    #loginForm .submit-btn {
      border-radius: 999px;
      padding: 0.95rem 1.5rem;
      font-weight: 700;
      font-size: 1rem;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    #loginForm .submit-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmerSlide 3s ease-in-out infinite;
    }
    @keyframes shimmerSlide {
      0%, 100% { left: -100%; }
      50% { left: 100%; }
    }
    #loginForm .submit-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 12px rgba(59, 130, 246, 0.3);
    }

    .forgot-password-link {
      display: block;
      text-align: right;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #3B82F6;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .forgot-password-link:hover {
      opacity: 0.8;
    }

    .register-hint {
      text-align: center;
      margin-top: 2rem;
      padding: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-light);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
      animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
    }

    .register-hint a {
      color: #3B82F6;
      font-weight: 700;
      text-decoration: none;
    }

    .register-hint a:hover {
      text-decoration: underline;
    }

    /* Social Login Buttons */
    .social-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.15s both;
    }
    .social-divider::before, .social-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E7EB;
    }
    .social-divider span {
      font-size: 0.8rem;
      color: #9CA3AF;
      white-space: nowrap;
    }
    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      border: 1.5px solid #E5E7EB;
      background: #fff;
      color: #374151;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .social-btn:active {
      transform: scale(0.98);
    }
    .social-btn:hover {
      border-color: #D1D5DB;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .social-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .social-btn.google-btn:hover {
      background: #F8F9FA;
    }
    .social-btn.apple-btn {
      background: #000;
      color: #fff;
      border-color: #000;
    }
    .social-btn.apple-btn:hover {
      background: #1a1a1a;
    }

    @media (prefers-reduced-motion: reduce) {
      .login-header, #loginForm, .register-hint { animation: none; opacity: 1; }
      #loginForm .submit-btn::after { animation: none; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header class="app-header">
       <a href="index.html" class="back-arrow">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
       </a>
       <h1>Anmelden</h1>
       <div style="width: 40px;"></div>
    </header>

    <main class="app-content">

      <div class="login-header">
        <div class="login-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </div>
        <h1 data-i18n="auth_login_title">Willkommen zurück!</h1>
        <p>Logge dich ein, um fortzufahren.</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail" data-i18n="auth_email">E-Mail Adresse</label>
          <input type="email" id="loginEmail" required data-i18n-placeholder="auth_email_placeholder" placeholder="deine@email.de" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="loginPassword" data-i18n="auth_password">Passwort</label>
          <input type="password" id="loginPassword" required data-i18n-placeholder="auth_password_placeholder" placeholder="••••••••" autocomplete="current-password">
          <a href="forgot-password.html" class="forgot-password-link">Passwort vergessen?</a>
        </div>

        <button type="submit" class="submit-btn" id="loginBtn" style="margin-top: 1.5rem;" data-i18n="auth_btn_login">Einloggen</button>
      </form>

      <!-- Social Login -->
      <div class="social-divider"><span>oder</span></div>

      <div class="social-buttons">
        <button type="button" class="social-btn google-btn" id="googleLoginBtn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Mit Google anmelden
        </button>

        <button type="button" class="social-btn apple-btn" id="appleLoginBtn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          Mit Apple anmelden
        </button>
      </div>

      <div class="register-hint">
        <span data-i18n="auth_no_account">Noch kein Konto?</span> <a href="register.html" data-i18n="auth_signup_link">Jetzt registrieren</a>
      </div>
    </main>
    
    <footer class="app-footer-nav" id="app-footer-nav"></footer>
  </div>

  <script src="lib/supabase.min.js"></script>
  <script src="config.js"></script>
<script src="session-cache.js"></script>
  <script src="room8-ui.js"></script>
  <script>
    // Supabase Client - Direkte Initialisierung
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var loginBtn = document.getElementById('loginBtn');
    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      if(!sb) {
          Room8UI.error("Verbindungsfehler: Supabase konnte nicht geladen werden.");
          return;
      }

      var email = document.getElementById('loginEmail').value.trim();
      var password = document.getElementById('loginPassword').value;
      
      loginBtn.disabled = true;
      var originalText = loginBtn.textContent;
      loginBtn.textContent = "Wird eingeloggt...";
      
      sb.auth.signInWithPassword({ email: email, password: password })
        .then(function(response) {
          if (response.error) { 
            throw response.error;
          } else { 
            // ZIEL: Dashboard
            window.location.href = 'dashboard.html'; 
          }
        })
        .catch(function(err) {
          console.error("Login Error:", err);
          var msg = err.message;
          if (msg === 'Invalid login credentials') msg = 'Falsches Passwort oder E-Mail.';
          Room8UI.error('Login fehlgeschlagen: ' + msg);
          
          loginBtn.disabled = false;
          loginBtn.textContent = originalText;
        });
    });
  </script>
  
  <script>
    // Social Login: Google
    document.getElementById('googleLoginBtn').addEventListener('click', async function() {
      try {
        var btn = this;
        btn.disabled = true;
        btn.style.opacity = '0.7';

        var { data, error } = await sb.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/dashboard.html'
          }
        });

        if (error) throw error;
        // Redirect wird automatisch von Supabase gemacht
      } catch(err) {
        console.error('Google Login Error:', err);
        Room8UI.error('Google Login fehlgeschlagen. Bitte versuche es erneut.');
        this.disabled = false;
        this.style.opacity = '1';
      }
    });

    // Social Login: Apple
    document.getElementById('appleLoginBtn').addEventListener('click', async function() {
      try {
        var btn = this;
        btn.disabled = true;
        btn.style.opacity = '0.7';

        var { data, error } = await sb.auth.signInWithOAuth({
          provider: 'apple',
          options: {
            redirectTo: window.location.origin + '/dashboard.html'
          }
        });

        if (error) throw error;
      } catch(err) {
        console.error('Apple Login Error:', err);
        Room8UI.error('Apple Login fehlgeschlagen. Bitte versuche es erneut.');
        this.disabled = false;
        this.style.opacity = '1';
      }
    });
  </script>

  <script src="translations.js"></script>
  <script>
    // Fix back-arrow for Capacitor iOS
    document.querySelectorAll('.back-arrow, a[href="index.html"]').forEach(function(arrow) {
      arrow.addEventListener('click', function(e) {
        e.preventDefault();
        var href = arrow.getAttribute('href');
        if (href && href !== '#') {
          try {
            window.location.href = href;
          } catch(err) {
            window.location.replace(href);
          }
        } else {
          window.history.back();
        }
      });
    });
  </script>
</body>
</html>
