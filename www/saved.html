<!DOCTYPE html>
<html lang="de" data-page="saved">
<head>
    <script src="sentry-init.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gespeichert - Room8</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .app-header {
            display: grid;
            grid-template-columns: 40px 1fr 40px;
            align-items: center;
            padding: calc(1.5rem + env(safe-area-inset-top)) 1.5rem 1.5rem 1.5rem;
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            color: white; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.25);
            margin-bottom: 1rem;
        }
        .app-header .back-btn { color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .app-header h1 { text-align: center; font-size: 1.15rem; margin: 0; }

        .saved-tabs { display: flex; gap: 0.5rem; padding: 0 1.25rem; margin-bottom: 1rem; }
        .saved-tab {
            flex: 1; padding: 0.6rem 0; border: none; border-radius: 12px;
            background: #F3F4F6; color: #6B7280; font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .saved-tab.active { background: var(--primary-color, #2563EB); color: white; }

        .saved-list { padding: 0 1.25rem 6rem; display: flex; flex-direction: column; gap: 0.85rem; }
        .saved-card {
            display: flex; gap: 0.85rem; align-items: center; padding: 0.9rem 1rem;
            background: white; border: 1px solid #EEF0F3; border-radius: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04); cursor: pointer; text-decoration: none; color: inherit;
        }
        .saved-card:active { transform: scale(0.99); }
        .saved-thumb {
            flex: 0 0 52px; width: 52px; height: 52px; border-radius: 12px;
            background: #EEF2FF; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; overflow: hidden;
        }
        .saved-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .saved-body { flex: 1; min-width: 0; }
        .saved-title { font-weight: 700; font-size: 0.95rem; color: #111827; margin-bottom: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .saved-sub { font-size: 0.82rem; color: #6B7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .saved-empty { text-align: center; color: #9CA3AF; padding: 3rem 1.5rem; }
        .saved-loading { text-align: center; color: #9CA3AF; padding: 2.5rem 1.5rem; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <a href="javascript:history.back()" class="back-btn" aria-label="Zurück">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </a>
        <h1 data-i18n="saves_title">Gespeichert</h1>
        <div style="width:40px;"></div>
    </header>

    <div class="saved-tabs" id="savedTabs">
        <button class="saved-tab active" data-tab="coupon" data-i18n="saves_tab_coupons">Coupons</button>
        <button class="saved-tab" data-tab="job" data-i18n="saves_tab_jobs">Jobs</button>
        <button class="saved-tab" data-tab="event" data-i18n="saves_tab_events">Events</button>
    </div>

    <div class="saved-list" id="savedList">
        <div class="saved-loading" data-i18n="common_loading">Lade...</div>
    </div>
</div>

<script src="lib/supabase.min.js"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script src="session-cache.js"></script>
<script src="navigation.js"></script>
<script src="room8-utils.js"></script>
<script src="room8-saves.js"></script>
<script>
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    function escapeHtml(t) { if (t === null || t === undefined) return ''; return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function t(key, fb) { return (window.Room8i18n && Room8i18n.t) ? Room8i18n.t(key) : fb; }

    var currentTab = 'coupon';
    var listEl = document.getElementById('savedList');

    document.getElementById('savedTabs').addEventListener('click', function(e) {
        var btn = e.target.closest('.saved-tab');
        if (!btn) return;
        document.querySelectorAll('.saved-tab').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        currentTab = btn.getAttribute('data-tab');
        renderTab();
    });

    function thumb(inner) { return '<div class="saved-thumb">' + inner + '</div>'; }

    async function renderTab() {
        listEl.innerHTML = '<div class="saved-loading">' + t('common_loading','Lade...') + '</div>';
        await Room8Saves.load();
        var ids = Room8Saves.listByType(currentTab);
        if (!ids.length) {
            listEl.innerHTML = '<div class="saved-empty">' + t('saves_empty','Noch nichts gespeichert.') + '</div>';
            return;
        }

        var cards = [];
        try {
            if (currentTab === 'coupon') {
                var cres = await sb.from('coupons').select('id, title, business_name, discount_value, city').in('id', ids);
                (cres.data || []).forEach(function(c) {
                    cards.push('<a class="saved-card" href="coupon-detail.html?id=' + encodeURIComponent(c.id) + '">' +
                        thumb('🎟️') +
                        '<div class="saved-body"><div class="saved-title">' + escapeHtml(c.title || c.business_name || 'Coupon') + '</div>' +
                        '<div class="saved-sub">' + escapeHtml([c.business_name, c.city].filter(Boolean).join(' · ')) + (c.discount_value ? ' · ' + escapeHtml(c.discount_value) : '') + '</div></div></a>');
                });
            } else if (currentTab === 'job') {
                var jres = await sb.from('listings').select('id, title, company_name, city').eq('type', 'job').in('id', ids);
                (jres.data || []).forEach(function(j) {
                    cards.push('<a class="saved-card" href="job-detail.html?id=' + encodeURIComponent(j.id) + '">' +
                        thumb('💼') +
                        '<div class="saved-body"><div class="saved-title">' + escapeHtml(j.title || 'Job') + '</div>' +
                        '<div class="saved-sub">' + escapeHtml([j.company_name || 'Privat', j.city].filter(Boolean).join(' · ')) + '</div></div></a>');
                });
            } else {
                var eres = await sb.from('events').select('id, title, start_at, location, city, cover_image_path').in('id', ids);
                (eres.data || []).forEach(function(ev) {
                    var img = '📅';
                    if (ev.cover_image_path && window.Room8) {
                        var url = Room8.getOptimizedImageUrl('event-images', ev.cover_image_path, { width: 120, height: 120, quality: 70 });
                        if (url) img = '<img src="' + encodeURI(url) + '" alt="" loading="lazy">';
                    }
                    var date = ev.start_at ? new Date(ev.start_at).toLocaleDateString('de-DE', { day:'2-digit', month:'short' }) : '';
                    cards.push('<a class="saved-card" href="event-detail.html?id=' + encodeURIComponent(ev.id) + '">' +
                        thumb(img) +
                        '<div class="saved-body"><div class="saved-title">' + escapeHtml(ev.title || 'Event') + '</div>' +
                        '<div class="saved-sub">' + escapeHtml([date, ev.location || ev.city].filter(Boolean).join(' · ')) + '</div></div></a>');
                });
            }
        } catch (e) {
            listEl.innerHTML = '<div class="saved-empty">' + t('saves_empty','Noch nichts gespeichert.') + '</div>';
            return;
        }

        listEl.innerHTML = cards.length ? cards.join('') : ('<div class="saved-empty">' + t('saves_empty','Noch nichts gespeichert.') + '</div>');
    }

    renderTab();
</script>
</body>
</html>
