<!DOCTYPE html>
<html lang="de">
<head>
    <script src="sentry-init.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Details - Room8</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* === HERO IMAGE SLIDER === */
        .image-slider {
            height: 300px;
            background-color: #e5e7eb;
            position: relative;
            overflow: hidden;
        }

        .slider-wrapper {
            display: flex;
            height: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
        }
        .slider-wrapper::-webkit-scrollbar { display: none; }

        .slide {
            min-width: 100%;
            height: 100%;
            scroll-snap-align: center;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slider-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }
        .dot.active { background: white; transform: scale(1.2); }

        /* === FULLSCREEN IMAGE OVERLAY === */
        .fullscreen-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .fullscreen-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }
        .fullscreen-wrapper::-webkit-scrollbar { display: none; }
        .fullscreen-slide {
            min-width: 100%;
            height: 100%;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fullscreen-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .fullscreen-close {
            position: absolute;
            top: calc(15px + env(safe-area-inset-top));
            right: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100000;
            cursor: pointer;
        }
        .fullscreen-dots {
            position: absolute;
            bottom: calc(20px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .fullscreen-dots .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
        }
        .fullscreen-dots .dot.active { background: white; transform: scale(1.2); }

        /* BACK BUTTON OVERLAY */
        .back-btn-overlay {
            position: absolute;
            top: calc(15px + env(safe-area-inset-top));            
            left: 15px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            z-index: 10;
        }

        /* Alte Glocke verstecken (wird von notificationBell.js ersetzt) */
        .notification-btn-overlay { display: none !important; }

        /* === CONTENT === */
        .detail-content {
            padding: 1.5rem;
            padding-bottom: calc(100px + env(safe-area-inset-bottom, 20px) + 30px); /* Platz für Sticky Footer */
            background: white;
            border-radius: 20px 20px 0 0;
            margin-top: -20px;
            position: relative;
            z-index: 5;
        }

        .header-section { margin-bottom: 1.5rem; }
        
        .listing-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 0.5rem 0;
            line-height: 1.2;
        }

        .listing-price {
            font-size: 1.25rem;
            color: #2563EB;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .price-badge {
            background: #ECFDF5;
            color: #065F46;
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
        }

        .location-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* ATTRIBUTES GRID */
        .attributes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background: #F9FAFB;
            border-radius: 12px;
        }

        .attr-item {
            display: flex;
            flex-direction: column;
        }
        .attr-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        .attr-value { font-size: 1rem; font-weight: 600; color: var(--text-main); }

        /* DESCRIPTION */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 1.5rem 0 0.75rem 0;
            color: var(--text-main);
        }

        .section-subtitle {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 1rem 0 0.5rem 0;
            color: var(--text-muted);
        }

        .description-text {
            color: #4B5563;
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-line; /* Erhält Zeilenumbrüche */
        }

        /* FEATURES TAGS */
        .features-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .feature-tag {
            background: white;
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .feature-tag.highlight {
            background: #ECFDF5;
            border-color: #10B981;
            color: #065F46;
        }

        .feature-tag.info {
            background: #F2F2F0;
            border-color: #E8604C;
            color: #D4503E;
        }

        /* ROOMS INFO BOX */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .room-item {
            background: #F9FAFB;
            border-radius: 8px;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .room-item .room-icon {
            font-size: 1.2rem;
        }

        .room-item .room-info {
            display: flex;
            flex-direction: column;
        }

        .room-item .room-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .room-item .room-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* SEEKER PROFILE BOX */
        .seeker-profile-box {
            background: #F7F7F5;
            border: 1px solid #EBEBEB;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 0.75rem;
        }

        .seeker-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .seeker-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #EBEBEB;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .seeker-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .seeker-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .seeker-about {
            font-size: 0.9rem;
            color: #4B5563;
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        .hobby-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .hobby-tag {
            background: white;
            border: 1px solid #E5E7EB;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        /* SWAP INFO BOX */
        .swap-info-box {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border: 1px solid #F59E0B;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 0.75rem;
        }

        .swap-title {
            font-weight: 700;
            font-size: 1rem;
            color: #92400E;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .swap-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(146, 64, 14, 0.1);
            font-size: 0.85rem;
        }

        .swap-detail-row:last-child {
            border-bottom: none;
        }

        .swap-label {
            color: #92400E;
        }

        .swap-value {
            font-weight: 600;
            color: #78350F;
        }

        /* OWNER PROFILE */
        .owner-card {
            display: flex;
            align-items: center;
            margin-top: 2rem;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer; /* Zeigt Klickbarkeit an */
            transition: background-color 0.2s;
        }
        
        .owner-card:active {
            background-color: #F3F4F6;
        }

        .owner-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e5e7eb;
            margin-right: 1rem;
            background-size: cover;
            background-position: center;
        }

        .owner-info h4 { margin: 0; font-size: 1rem; }
        .owner-info p { margin: 0; font-size: 0.8rem; color: var(--text-muted); }
        .owner-arrow { margin-left: auto; color: #D1D5DB; }

        /* REPORT BUTTON */
        .report-section {
            margin-top: 2rem;
            text-align: center;
            border-top: 1px solid #F3F4F6;
            padding-top: 1rem;
        }

        .btn-report {
            background: #FEF3C7;
            border: 1px solid #FCD34D;
            color: #D97706;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .btn-report:hover {
            background: #FDE68A;
            transform: scale(1.02);
        }

        /* STICKY FOOTER ACTION BAR */
        .action-bar {
            position: fixed;
            bottom: calc(100px + env(safe-area-inset-bottom, 0px));
            left: 16px;
            right: 16px;
            width: auto;
            background: white;
            padding: 0.75rem 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            gap: 0.75rem;
            z-index: 10000;
            box-sizing: border-box;
            border-radius: 16px;
        }

        /* Content Padding damit Action-Bar nichts verdeckt */
        .detail-content {
            padding-bottom: 220px !important;
        }

        .btn-fav {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #d1d5db;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-fav.active {
            color: #EF4444;
            border-color: #EF4444;
            background: #FEF2F2;
        }

        .btn-contact {
            flex: 1;
            height: 48px;
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-contact:active {
            transform: scale(0.98);
        }

        .btn-report-small {
            width: 48px;
            height: 48px;
            background: #FEF3C7;
            color: #D97706;
            border: 1px solid #FCD34D;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-report-small:active {
            transform: scale(0.95);
            background: #FDE68A;
        }

        .btn-report-small {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 1px solid #FCD34D;
            background: #FEF3C7;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #D97706;
            transition: all 0.2s;
        }
        .btn-report-small:hover {
            background: #FDE68A;
        }
    </style>
</head>
<body>

    <!-- Header Image Slider -->
    <div class="image-slider">
        <a href="javascript:history.back()" class="back-btn-overlay">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        
        <!-- Glocke wird automatisch von notificationBell.js eingefügt -->
        
        <div class="slider-wrapper" id="sliderWrapper">
            <!-- Bilder werden per JS geladen -->
            <div class="slide"><img src="assets/placeholder.jpg" id="placeholderImg" onerror="this.src='https://via.placeholder.com/400x300?text=Loading...'"></div>
        </div>
        
        <div class="slider-dots" id="sliderDots"></div>
    </div>

    <!-- Fullscreen Image Overlay -->
    <div class="fullscreen-overlay" id="fullscreenOverlay" style="display:none;">
        <button class="fullscreen-close" onclick="closeFullscreen()">&times;</button>
        <div class="fullscreen-wrapper" id="fullscreenWrapper"></div>
        <div class="fullscreen-dots" id="fullscreenDots"></div>
    </div>

    <!-- Main Content -->
    <div class="detail-content">
        <div class="header-section">
            <div class="price-badge" id="typeBadge" style="display:inline-block; margin-bottom:0.5rem;"></div>
            <h1 class="listing-title" id="title"></h1>
            <div class="listing-price" id="price">-- €</div>
            <div class="location-row">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span id="location"></span>
            </div>
        </div>

        <div class="attributes-grid" id="attributesGrid">
            <!-- Dynamische Attribute wie Größe, Zimmer etc. -->
        </div>

        <div class="section-title" id="descTitle"></div>
        <div class="description-text" id="description"></div>

        <!-- Sucher-Profil (Nur bei Gesuch) -->
        <div id="seekerProfileSection" style="display:none;">
            <div class="section-title" id="seekerTitle"></div>
            <div class="seeker-profile-box" id="seekerProfileBox"></div>
        </div>

        <!-- WG Präferenzen (Nur bei Gesuch) -->
        <div id="wgPreferencesSection" style="display:none;">
            <div class="section-title" id="wgPrefTitle"></div>
            <div class="features-wrap" id="wgPreferencesList"></div>
        </div>

        <!-- Tausch-Details (Nur bei Tausch) -->
        <div id="swapSection" style="display:none;">
            <div class="section-title" id="swapTitle"></div>
            <div class="swap-info-box" id="swapInfoBox"></div>
        </div>

        <!-- Räume (Eigen/Geteilt) -->
        <div id="roomsSection" style="display:none;">
            <div class="section-title" id="roomsTitle"></div>
            <div class="rooms-grid" id="roomsGrid"></div>
        </div>

        <!-- Badezimmer Details -->
        <div id="bathroomSection" style="display:none;">
            <div class="section-title" id="bathroomTitle"></div>
            <div class="features-wrap" id="bathroomList"></div>
        </div>

        <!-- Küchen Details -->
        <div id="kitchenSection" style="display:none;">
            <div class="section-title" id="kitchenTitle"></div>
            <div class="features-wrap" id="kitchenList"></div>
        </div>

        <!-- WG Details -->
        <div id="wgDetailsSection" style="display:none;">
            <div class="section-title" id="wgDetailsTitle"></div>
            <div class="features-wrap" id="wgDetailsList"></div>
        </div>

        <!-- Ausstattung (Nur Wohnungen) -->
        <div id="featuresSection" style="display:none;">
            <div class="section-title" id="featuresTitle"></div>
            <div class="features-wrap" id="featuresList"></div>
        </div>

        <!-- Möbel (Nur Wohnungen) -->
        <div id="furnitureSection" style="display:none;">
            <div class="section-title" id="furnitureTitle"></div>
            <div class="features-wrap" id="furnitureList"></div>
        </div>

        <!-- Inklusive Kosten (Nur Wohnungen) -->
        <div id="utilitiesSection" style="display:none;">
            <div class="section-title" id="utilitiesTitle"></div>
            <div class="features-wrap" id="utilitiesList"></div>
        </div>

        <!-- Lage-Infos -->
        <div id="locationInfoSection" style="display:none;">
            <div class="section-title" id="locationInfoTitle"></div>
            <div class="features-wrap" id="locationInfoList"></div>
        </div>

        <!-- Sonstiges -->
        <div id="miscSection" style="display:none;">
            <div class="section-title" id="miscTitle"></div>
            <div class="features-wrap" id="miscList"></div>
        </div>

        <!-- Reinigungsservice Banner (nur Wohnungen) -->
        <div id="cleaningBanner" style="display:none;"></div>

        <!-- Besitzer -->
        <div class="section-title" id="sellerTitle"></div>
        <div class="owner-card" id="ownerCard">
            <div class="owner-avatar" id="ownerAvatar"></div>
            <div class="owner-info">
                <h4 id="ownerName"></h4>
                <p id="viewProfileText"></p>
            </div>
            <div class="owner-arrow">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </div>
        </div>

    </div>

    <!-- Footer Action Bar -->
    <div class="action-bar">
        <button class="btn-fav" id="favBtn" onclick="toggleFavorite()">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        </button>
        <button class="btn-contact" id="contactBtn"></button>
        <button class="btn-report-small" id="reportBtnBar" onclick="reportListing()">⚠️</button>
    </div>

    <!-- Report Modal -->
    <div id="reportModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:99999; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
        <div style="background:white; border-radius:20px; width:90%; max-width:400px; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="background:linear-gradient(135deg,#FEE2E2,#FECACA); padding:1.25rem 1.5rem; border-radius:20px 20px 0 0; display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:0.6rem;">
                    <span style="font-size:1.4rem;">🚩</span>
                    <h3 id="reportModalTitle" style="margin:0; font-size:1.1rem; color:#991B1B;"></h3>
                </div>
                <button id="reportModalClose" style="background:rgba(0,0,0,0.08); border:none; width:32px; height:32px; border-radius:50%; font-size:1.2rem; cursor:pointer; color:#6b7280; display:flex; align-items:center; justify-content:center;">&times;</button>
            </div>
            <div style="padding:1.25rem;">
                <p id="reportModalPrompt" style="margin:0 0 1rem; font-size:0.85rem; color:#6b7280;"></p>
                <div id="reportReasons" style="display:flex; flex-direction:column; gap:0.5rem;"></div>
                <div style="margin-top:1rem;">
                    <label id="reportExtraLabel" style="display:block; margin-bottom:0.4rem; font-weight:600; font-size:0.85rem; color:#374151;"></label>
                    <textarea id="reportDescription" style="width:100%; min-height:80px; padding:0.7rem; border:1.5px solid #e5e7eb; border-radius:10px; font-family:inherit; font-size:0.85rem; resize:vertical; box-sizing:border-box;"></textarea>
                </div>
                <button id="reportSubmitBtn" disabled style="width:100%; margin-top:1rem; padding:0.85rem; background:#EF4444; color:white; border:none; border-radius:12px; font-weight:700; font-size:0.95rem; cursor:pointer; opacity:0.5; transition:all 0.2s;"></button>
            </div>
        </div>
    </div>

<script>
    // Supabase Client - Direkte Initialisierung
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Translation Helper
    var tr = (typeof Room8i18n !== 'undefined') ? Room8i18n.t : function(k) { return k; };

    // XSS Protection
    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // URL Params
    const urlParams = new URLSearchParams(window.location.search);
    const listingId = urlParams.get('id');
    
    var currentListing = null;
    var isFavorited = false;
    var currentUserId = null;

    // Navigation Helper
    function navigateTo(url) {
        try { window.location.href = url; } catch(e) { console.warn(e); }
    }

    async function loadDetails() {
        if (!listingId || !sb) return;

        try {
            // 1. User check (für Favorite Button)
            const { data: { user } } = await sb.auth.getUser();
            currentUserId = user ? user.id : null;

            // 2. Listing laden (inkl. Owner Profile)
            const { data: listing, error } = await sb
                .from('listings')
                .select(`
                    *,
                    owner:owner_id (
                        id,
                        full_name,
                        username,
                        avatar_url,
                        created_at
                    )
                `)
                .eq('id', listingId)
                .single();

            if (error) throw error;
            currentListing = listing;

            // Block-Check: Ist der Inserat-Ersteller blockiert?
            if (currentUserId && listing.owner_id && listing.owner_id !== currentUserId && window.Room8) {
                var isBlocked = await Room8.isUserBlocked(listing.owner_id);
                if (isBlocked) {
                    document.querySelector('.app-container').innerHTML = '<div style="padding:3rem;text-align:center;margin-top:calc(2rem + env(safe-area-inset-top));"><div style="font-size:3rem;margin-bottom:1rem;">\uD83D\uDEAB</div><h2 style="font-size:1.3rem;color:#1f2937;margin-bottom:0.5rem;">User blocked</h2><p style="color:#6b7280;font-size:0.95rem;line-height:1.5;margin-bottom:1.5rem;">You have blocked the creator of this listing.</p><button onclick="history.back()" style="display:inline-block;background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;padding:0.85rem 2rem;border-radius:12px;border:none;font-weight:600;font-size:0.95rem;cursor:pointer;">Back</button></div>';
                    return;
                }
            }

            // Navigation Highlight basierend auf Typ
            window.currentListingType = listing.type;
            setTimeout(function() {
                var navItems = document.querySelectorAll('.bottom-nav-item');
                navItems.forEach(function(item) {
                    item.classList.remove('active', 'active-housing', 'active-marketplace');
                });
                if (listing.type === 'wohnung') {
                    var wohnenNav = document.querySelector('.bottom-nav-item[data-href="wohnungen.html"]');
                    if (wohnenNav) wohnenNav.classList.add('active-housing');
                } else if (listing.type === 'gegenstand') {
                    var marktNav = document.querySelector('.bottom-nav-item[data-href="gegenstaende.html"]');
                    if (marktNav) marktNav.classList.add('active-marketplace');
                }
            }, 200);

            // 3. UI befüllen
            fillUI(listing);

            // 4. Bilder laden
            loadImages(listingId);

            // 5. Favorite Status checken
            if (currentUserId) checkFavoriteStatus();

            // 6. Eigenes Inserat: Favoriten/Melden-Buttons verstecken, Kontakt zu Bearbeiten
            if (currentUserId && listing.owner_id === currentUserId) {
                document.getElementById('favBtn').style.display = 'none';
                document.getElementById('reportBtnBar').style.display = 'none';
                document.getElementById('contactBtn').textContent = tr('detail_edit_listing');
                document.getElementById('contactBtn').onclick = function() {
                    var editPage = listing.type === 'wohnung' ? 'wohnung.html' : 'gegenstand.html';
                    navigateTo(editPage + '?id=' + listingId);
                };
            } else {
                // 7. View Counter inkrementieren (nur für fremde Inserate)
                sb.from('listings')
                    .update({ view_count: (listing.view_count || 0) + 1 })
                    .eq('id', listingId)
                    .then(() => console.log('View count incremented'));
            }

        } catch (err) {
            console.error(err);
            document.getElementById('title').textContent = tr('detail_error_loading');
            document.getElementById('description').textContent = err.message;
        }
    }

    function renderTags(sectionId, listId, dataObj, labelsMap) {
        if (!dataObj) return;
        const list = document.getElementById(listId);
        let hasItems = false;
        
        for (const [key, label] of Object.entries(labelsMap)) {
            if (dataObj[key]) {
                list.innerHTML += `<span class="feature-tag">✅ ${label}</span>`;
                hasItems = true;
            }
        }
        
        if (hasItems) document.getElementById(sectionId).style.display = 'block';
    }

            'art': '\uD83C\uDFA8 ' + tr('detail_hobby_art')
        };

        let html = `<div class="seeker-header">`;
        html += `<div class="seeker-avatar">${genderEmoji[profile.gender] || '👤'}</div>`;
        html += `<div>`;
        
        let meta = [];
        if (profile.age) meta.push(profile.age + ' ' + tr('detail_age_years'));
        if (profile.occupation) meta.push(profile.occupation);
        if (profile.semester) meta.push(profile.semester);
        
        html += `<div class="seeker-name">${meta.length > 0 ? meta[0] : tr('detail_seeker_default')}</div>`;
        if (meta.length > 1) html += `<div class="seeker-meta">${meta.slice(1).join(' • ')}</div>`;
        html += `</div></div>`;

        if (profile.about_text) {
            html += `<div class="seeker-about">${profile.about_text}</div>`;
        }

        // Situation Tags
        let tags = [];
        if (profile.is_smoker) tags.push('\uD83D\uDEAC ' + tr('detail_smoker'));
        if (profile.has_pet) tags.push('\uD83D\uDC3E ' + tr('detail_has_pet') + (profile.pet_type ? ` (${profile.pet_type})` : ''));
        if (profile.needs_anmeldung) tags.push('\uD83D\uDCCB ' + tr('detail_needs_registration'));
        
        const flexLabels = {
            'immediate': '\u26A1 ' + tr('detail_immediate'),
            '1-2_weeks': '\uD83D\uDCC5 1-2 weeks',
            '1_month': '\uD83D\uDDD3\uFE0F ~1 month',
            'flexible': '\uD83D\uDD04 ' + tr('detail_flex_very')
        };
        if (profile.move_flexibility && flexLabels[profile.move_flexibility]) {
            tags.push(flexLabels[profile.move_flexibility]);
        }

        if (tags.length > 0) {
            html += `<div class="features-wrap" style="margin-bottom: 0.75rem;">`;
            tags.forEach(t => html += `<span class="feature-tag">${t}</span>`);
            html += `</div>`;
        }

        // Hobbys
        if (profile.hobbies && profile.hobbies.length > 0) {
            html += `<div class="hobby-tags">`;
            profile.hobbies.forEach(h => {
                if (hobbyLabels[h]) html += `<span class="hobby-tag">${hobbyLabels[h]}</span>`;
            });
            html += `</div>`;
        }

        box.innerHTML = html;
        document.getElementById('seekerProfileSection').style.display = 'block';
    }

            'mixed': '\uD83D\uDD00 ' + tr('detail_mixed')

        const typeLabels = {

            'mixed': '\uD83D\uDD00 ' + tr('detail_mixed'),

            list.innerHTML += `<span class="feature-tag">\uD83D\uDEAC ${tr('detail_smoking_yes')} ok</span>`;

    async function loadImages(id) {
        const { data: photos } = await sb
            .from('listing_photos')
            .select('storage_path')
            .eq('listing_id', id)
            .order('display_order');

        const wrapper = document.getElementById('sliderWrapper');
        const dots = document.getElementById('sliderDots');
        
        if (photos && photos.length > 0) {
            wrapper.innerHTML = ''; // Remove placeholder

            photos.forEach((p, index) => {
                // Slide-Bild: 900px optimiert (WebP, q80) - schnelles Laden
                // Fullscreen-Bild: 1600px (in data-fullsrc, wird erst bei Klick geladen)
                const slideUrl = window.Room8 ? Room8.getOptimizedImageUrl('listing-images', p.storage_path, { width: 900, quality: 80 }) : null;
                const fullUrl = window.Room8 ? Room8.getOptimizedImageUrl('listing-images', p.storage_path, { width: 1600, quality: 85 }) : null;
                const fallback = sb.storage.from('listing-images').getPublicUrl(p.storage_path);
                const finalSlideUrl = slideUrl || (fallback && fallback.data ? fallback.data.publicUrl : null);
                const finalFullUrl = fullUrl || finalSlideUrl;

                if (finalSlideUrl) {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    const loadingAttr = index === 0 ? 'eager' : 'lazy';
                    slide.innerHTML = `<img src="${finalSlideUrl}" data-fullsrc="${finalFullUrl}" loading="${loadingAttr}" decoding="async" onclick="openFullscreen(${index})" style="cursor:pointer;">`;
                    wrapper.appendChild(slide);

                    const dot = document.createElement('div');
                    dot.className = 'dot' + (index === 0 ? ' active' : '');
                    dots.appendChild(dot);
                }
            });
        } else {
            // Kein Bild vorhanden - ordentlicher Placeholder
            wrapper.innerHTML = `<div class="slide" style="background: #EBEBEB; display: flex; align-items: center; justify-content: center;">
                <div style="text-align: center; color: #929292;">
                    <div style="font-size: 3.5rem; margin-top: -20px;">🏠</div>
                    <div style="font-size: 0.9rem; font-weight: 600; color: #929292; margin-top: 4px;">No Image</div>
                </div>
            </div>`;
        }
    }

    // === FULLSCREEN IMAGE VIEWER ===
    function openFullscreen(startIndex) {
        var slides = document.querySelectorAll('#sliderWrapper .slide img');
        if (!slides.length) return;

        var wrapper = document.getElementById('fullscreenWrapper');
        var dots = document.getElementById('fullscreenDots');
        wrapper.innerHTML = '';
        dots.innerHTML = '';

        slides.forEach(function(img, i) {
            var slide = document.createElement('div');
            slide.className = 'fullscreen-slide';
            // Hoehere Aufloesung in Fullscreen (data-fullsrc statt src)
            var fullSrc = img.getAttribute('data-fullsrc') || img.src;
            slide.innerHTML = '<img src="' + fullSrc + '" decoding="async">';
            wrapper.appendChild(slide);

            var dot = document.createElement('div');
            dot.className = 'dot' + (i === startIndex ? ' active' : '');
            dots.appendChild(dot);
        });

        var overlay = document.getElementById('fullscreenOverlay');
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';

        // Zum angeklickten Bild scrollen
        setTimeout(function() {
            wrapper.scrollTo({ left: startIndex * wrapper.offsetWidth, behavior: 'instant' });
        }, 10);

        // Scroll-Listener fuer Dot-Update
        wrapper.onscroll = function() {
            var idx = Math.round(wrapper.scrollLeft / wrapper.offsetWidth);
            var allDots = dots.querySelectorAll('.dot');
            allDots.forEach(function(d, i) {
                d.classList.toggle('active', i === idx);
            });
        };
    }

    function closeFullscreen() {
        document.getElementById('fullscreenOverlay').style.display = 'none';
        document.body.style.overflow = '';
    }

    // ESC-Taste schliesst Fullscreen
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeFullscreen();
    });

    // Helpers
    // Generischer Fallback: underscore_text → Lesbarer Text
    function humanize(str) {
        if (!str) return '';
        return str.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }

    function formatRoomType(type) {
        const map = { 'wg_room': tr('detail_room_wg'), 'entire_apartment': tr('detail_room_apartment'), 'studio': tr('detail_room_studio'), 'house': tr('detail_room_house'), 'shared_room': tr('detail_room_shared_room'), 'room': tr('detail_rooms') };
        return map[type] || humanize(type);
    }

    function formatDate(dateStr) {
        if (!dateStr) return tr('detail_immediate');
        var lang = localStorage.getItem('room8_language') || 'de';
        var locale = lang === 'en' ? 'en-US' : 'de-DE';
        return new Date(dateStr).toLocaleDateString(locale);
    }

    // Favorites Logic
    async function checkFavoriteStatus() {
        const { data } = await sb.from('favorites').select('id').eq('listing_id', listingId).eq('user_id', currentUserId);
        if (data && data.length > 0) {
            isFavorited = true;
            updateFavBtn();
        }
    }

    async function toggleFavorite() {
        if (!currentUserId) {
            if(confirm(tr('detail_please_login'))) navigateTo('login.html');
            return;
        }

        // Eigenes Inserat kann nicht favorisiert werden
        if (currentListing && currentListing.owner_id === currentUserId) {
            Room8UI.warning(tr('detail_cant_favorite_own'));
            return;
        }

        const btn = document.getElementById('favBtn');
        const wasNotFavorited = !isFavorited;

        // Optimistic Update
        isFavorited = !isFavorited;
        updateFavBtn();

        if (isFavorited) {
            await sb.from('favorites').insert({ user_id: currentUserId, listing_id: listingId });

            // Send notification to listing owner (only when adding to favorites)
            if (wasNotFavorited && currentListing && currentListing.owner_id && currentListing.owner_id !== currentUserId && window.NotificationHelpers) {
                try {
                    var profileRes = await sb.from('profiles').select('username, full_name').eq('id', currentUserId).single();
                    var faverName = profileRes.data ? (profileRes.data.full_name || profileRes.data.username || tr('detail_user_fallback')) : tr('detail_user_fallback');
                    NotificationHelpers.notifyFavorite(currentListing.owner_id, faverName, currentListing.title, listingId);
                } catch(e) { console.log('Notification error:', e); }
            }
        } else {
            await sb.from('favorites').delete().eq('user_id', currentUserId).eq('listing_id', listingId);
        }
    }

    function updateFavBtn() {
        const btn = document.getElementById('favBtn');
        if (isFavorited) {
            btn.classList.add('active');
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#EF4444" stroke="#EF4444" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
        } else {
            btn.classList.remove('active');
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
        }
    }
    
    // Reporting Function
    var selectedReportReason = null;
    var reportReasons = [
        { icon: '\uD83D\uDEAB', label: tr('detail_report_fraud') },
        { icon: '\u274C', label: tr('detail_report_wrong_info') },
        { icon: '\u2705', label: tr('detail_report_rented') },
        { icon: '\uD83D\uDCE2', label: tr('detail_report_spam') },
        { icon: '\uD83D\uDDBC\uFE0F', label: tr('detail_report_images') },
        { icon: '\uD83D\uDCDD', label: tr('detail_report_other') }
    ];

    // Report Modal aufbauen
    (function() {
        var container = document.getElementById('reportReasons');
        if (!container) return;
        reportReasons.forEach(function(r) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'report-reason-btn';
            btn.style.cssText = 'display:flex;align-items:center;gap:0.7rem;padding:0.75rem 1rem;border:1.5px solid #e5e7eb;border-radius:10px;background:white;cursor:pointer;font-size:0.88rem;color:#374151;transition:all 0.15s;text-align:left;width:100%;';
            btn.innerHTML = '<span style="font-size:1.1rem;">' + r.icon + '</span><span>' + r.label + '</span>';
            btn.addEventListener('click', function() {
                document.querySelectorAll('.report-reason-btn').forEach(function(b) {
                    b.style.borderColor = '#e5e7eb';
                    b.style.background = 'white';
                });
                btn.style.borderColor = '#EF4444';
                btn.style.background = '#FEF2F2';
                selectedReportReason = r.label;
                document.getElementById('reportSubmitBtn').disabled = false;
                document.getElementById('reportSubmitBtn').style.opacity = '1';
            });
            container.appendChild(btn);
        });

        document.getElementById('reportModalClose').addEventListener('click', closeReportModal);
        document.getElementById('reportModal').addEventListener('click', function(e) {
            if (e.target === document.getElementById('reportModal')) closeReportModal();
        });

        document.getElementById('reportSubmitBtn').addEventListener('click', function() {
            if (!selectedReportReason || !currentUserId) return;
            var btn = document.getElementById('reportSubmitBtn');
            btn.disabled = true;
            btn.textContent = tr('detail_report_sending');
            var desc = document.getElementById('reportDescription').value.trim();
            // RPC report_content erzwingt Anti-Trolling Rate-Limit (5/h, 30/d).
            // Reason-Label kommt als 'reason', User-Kommentar als 'message'.
            sb.rpc('report_content', {
                p_target_type: 'listing',
                p_target_id: String(listingId),
                p_reason: selectedReportReason,
                p_message: desc || null
            }).then(function(result) {
                if (result.error) {
                    var msg = result.error.message || '';
                    if (msg.indexOf('Zu viele') !== -1 || msg.indexOf('Tageslimit') !== -1) {
                        Room8UI.warning(msg);
                    } else {
                        Room8UI.error(tr('detail_report_sent_error'));
                    }
                    btn.disabled = false;
                    btn.textContent = tr('detail_report_submit');
                } else {
                    Room8UI.success(tr('detail_report_sent_success'));
                    closeReportModal();
                }
            }).catch(function(err) {
                // Netzwerk-Fehler darf den Button nicht dauerhaft disabled lassen.
                console.error('report_content RPC failed:', err);
                Room8UI.error(tr('detail_report_sent_error'));
                btn.disabled = false;
                btn.textContent = tr('detail_report_submit');
            });
        });
    })();

    function closeReportModal() {
        document.getElementById('reportModal').style.display = 'none';
        selectedReportReason = null;
        document.getElementById('reportDescription').value = '';
        document.querySelectorAll('.report-reason-btn').forEach(function(b) {
            b.style.borderColor = '#e5e7eb';
            b.style.background = 'white';
        });
        var btn = document.getElementById('reportSubmitBtn');
        btn.disabled = true;
        btn.style.opacity = '0.5';
        btn.textContent = tr('detail_report_submit');
    }

    function reportListing() {
        if (!currentUserId) {
            Room8UI.warning(tr('detail_report_login_required'));
            return;
        }
        if (currentListing && currentListing.owner_id === currentUserId) {
            Room8UI.warning(tr('detail_report_cant_own'));
            return;
        }
        document.getElementById('reportModal').style.display = 'flex';
    }

    // Init
    loadDetails();

</script>
