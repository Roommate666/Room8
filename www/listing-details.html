<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Details - Room8</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Notification Badge auf Detail-Seiten ausblenden */
        .notification-bell-badge {
            display: none !important;
        }

        /* === HERO IMAGE SLIDER === */
        .image-slider {
            height: 300px;
            background-color: #e5e7eb;
            position: relative;
            overflow: hidden;
        }

        .slider-wrapper {
            display: flex;
            height: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
        }
        .slider-wrapper::-webkit-scrollbar { display: none; }

        .slide {
            min-width: 100%;
            height: 100%;
            scroll-snap-align: center;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slider-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }
        .dot.active { background: white; transform: scale(1.2); }

        /* BACK BUTTON OVERLAY */
        .back-btn-overlay {
            position: absolute;
            top: calc(15px + env(safe-area-inset-top));
            left: 15px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            z-index: 60;
        }

        /* Glocke wird dynamisch von notificationBell.js eingefuegt */

        /* === CONTENT === */
        .detail-content {
            padding: 1.5rem;
            padding-bottom: calc(100px + env(safe-area-inset-bottom, 20px) + 30px); /* Platz für Sticky Footer */
            background: white;
            border-radius: 20px 20px 0 0;
            margin-top: -20px;
            position: relative;
            z-index: 5;
        }

        .header-section { margin-bottom: 1.5rem; }
        
        .listing-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 0.5rem 0;
            line-height: 1.2;
        }

        .listing-price {
            font-size: 1.25rem;
            color: var(--primary-color);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .price-badge {
            background: #ECFDF5;
            color: #065F46;
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
        }

        .location-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* ATTRIBUTES GRID */
        .attributes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background: #F9FAFB;
            border-radius: 12px;
        }

        .attr-item {
            display: flex;
            flex-direction: column;
        }
        .attr-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        .attr-value { font-size: 1rem; font-weight: 600; color: var(--text-main); }

        /* DESCRIPTION */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 1.5rem 0 0.75rem 0;
            color: var(--text-main);
        }

        .section-subtitle {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 1rem 0 0.5rem 0;
            color: var(--text-muted);
        }

        .description-text {
            color: #4B5563;
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-line; /* Erhält Zeilenumbrüche */
        }

        /* FEATURES TAGS */
        .features-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .feature-tag {
            background: white;
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .feature-tag.highlight {
            background: #ECFDF5;
            border-color: #10B981;
            color: #065F46;
        }

        .feature-tag.info {
            background: #EEF2FF;
            border-color: #6366F1;
            color: #4338CA;
        }

        /* ROOMS INFO BOX */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .room-item {
            background: #F9FAFB;
            border-radius: 8px;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .room-item .room-icon {
            font-size: 1.2rem;
        }

        .room-item .room-info {
            display: flex;
            flex-direction: column;
        }

        .room-item .room-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .room-item .room-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* SEEKER PROFILE BOX */
        .seeker-profile-box {
            background: linear-gradient(135deg, #EEF2FF 0%, #F5F3FF 100%);
            border: 1px solid #C7D2FE;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 0.75rem;
        }

        .seeker-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .seeker-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #C7D2FE;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .seeker-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .seeker-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .seeker-about {
            font-size: 0.9rem;
            color: #4B5563;
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        .hobby-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .hobby-tag {
            background: white;
            border: 1px solid #E5E7EB;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        /* SWAP INFO BOX */
        .swap-info-box {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border: 1px solid #F59E0B;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 0.75rem;
        }

        .swap-title {
            font-weight: 700;
            font-size: 1rem;
            color: #92400E;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .swap-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(146, 64, 14, 0.1);
            font-size: 0.85rem;
        }

        .swap-detail-row:last-child {
            border-bottom: none;
        }

        .swap-label {
            color: #92400E;
        }

        .swap-value {
            font-weight: 600;
            color: #78350F;
        }

        /* OWNER PROFILE */
        .owner-card {
            display: flex;
            align-items: center;
            margin-top: 2rem;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer; /* Zeigt Klickbarkeit an */
            transition: background-color 0.2s;
        }
        
        .owner-card:active {
            background-color: #F3F4F6;
        }

        .owner-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e5e7eb;
            margin-right: 1rem;
            background-size: cover;
            background-position: center;
        }

        .owner-info h4 { margin: 0; font-size: 1rem; }
        .owner-info p { margin: 0; font-size: 0.8rem; color: var(--text-muted); }
        .owner-arrow { margin-left: auto; color: #D1D5DB; }

        /* REPORT BUTTON */
        .report-section {
            margin-top: 2rem;
            text-align: center;
            border-top: 1px solid #F3F4F6;
            padding-top: 1rem;
        }

        .btn-report {
            background: #FEF3C7;
            border: 1px solid #FCD34D;
            color: #D97706;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .btn-report:hover {
            background: #FDE68A;
            transform: scale(1.02);
        }

        /* STICKY FOOTER ACTION BAR */
        .action-bar {
            position: fixed;
            bottom: 90px;
            left: 16px;
            right: 16px;
            width: auto;
            background: white;
            padding: 0.75rem 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            gap: 0.75rem;
            z-index: 10000;
            box-sizing: border-box;
            border-radius: 16px;
        }

        /* Content Padding damit Action-Bar nichts verdeckt */
        .detail-content {
            padding-bottom: 180px !important;
        }

        .btn-fav {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #d1d5db;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-fav.active {
            color: #EF4444;
            border-color: #EF4444;
            background: #FEF2F2;
        }

        .btn-contact {
            flex: 1;
            height: 48px;
            background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-contact:active {
            transform: scale(0.98);
        }

        .btn-report-small {
            width: 48px;
            height: 48px;
            background: #FEF3C7;
            color: #D97706;
            border: 1px solid #FCD34D;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-report-small:active {
            transform: scale(0.95);
            background: #FDE68A;
        }

        .btn-report-small {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 1px solid #FCD34D;
            background: #FEF3C7;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #D97706;
            transition: all 0.2s;
        }
        .btn-report-small:hover {
            background: #FDE68A;
        }
    </style>
</head>
<body>

    <!-- Header Image Slider -->
    <div class="image-slider">
        <a href="javascript:history.back()" class="back-btn-overlay">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        
        <!-- Glocke wird dynamisch von notificationBell.js eingefuegt -->
        
        <div class="slider-wrapper" id="sliderWrapper">
            <!-- Bilder werden per JS geladen -->
            <div class="slide"><img src="assets/placeholder.jpg" id="placeholderImg" onerror="this.src='no-image.svg'"></div>
        </div>
        
        <div class="slider-dots" id="sliderDots"></div>
    </div>

    <!-- Main Content -->
    <div class="detail-content">
        <div class="header-section">
            <div class="price-badge" id="typeBadge" style="display:inline-block; margin-bottom:0.5rem;">Angebot</div>
            <h1 class="listing-title" id="title">Lädt Details...</h1>
            <div class="listing-price" id="price">-- €</div>
            <div class="location-row">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span id="location">Stadt, Viertel</span>
            </div>
            <div id="refCodeRow" style="display:none; font-size: 0.75rem; color: #9ca3af; margin-top: 0.5rem;">Referenz-Nr: <span id="refCode"></span></div>
        </div>

        <div class="attributes-grid" id="attributesGrid">
            <!-- Dynamische Attribute wie Größe, Zimmer etc. -->
        </div>

        <div class="section-title" id="descTitle"></div>
        <div class="description-text" id="description"></div>

        <!-- Sucher-Profil (Nur bei Gesuch) -->
        <div id="seekerProfileSection" style="display:none;">
            <div class="section-title" id="seekerTitle"></div>
            <div class="seeker-profile-box" id="seekerProfileBox"></div>
        </div>

        <!-- WG Praeferenzen (Nur bei Gesuch) -->
        <div id="wgPreferencesSection" style="display:none;">
            <div class="section-title" id="wgPrefTitle"></div>
            <div class="features-wrap" id="wgPreferencesList"></div>
        </div>

        <!-- Tausch-Details (Nur bei Tausch) -->
        <div id="swapSection" style="display:none;">
            <div class="section-title" id="swapTitle"></div>
            <div class="swap-info-box" id="swapInfoBox"></div>
        </div>

        <!-- Raeume (Eigen/Geteilt) -->
        <div id="roomsSection" style="display:none;">
            <div class="section-title" id="roomsTitle"></div>
            <div class="rooms-grid" id="roomsGrid"></div>
        </div>

        <!-- Badezimmer Details -->
        <div id="bathroomSection" style="display:none;">
            <div class="section-title" id="bathroomTitle"></div>
            <div class="features-wrap" id="bathroomList"></div>
        </div>

        <!-- Kuechen Details -->
        <div id="kitchenSection" style="display:none;">
            <div class="section-title" id="kitchenTitle"></div>
            <div class="features-wrap" id="kitchenList"></div>
        </div>

        <!-- WG Details -->
        <div id="wgDetailsSection" style="display:none;">
            <div class="section-title" id="wgDetailsTitle"></div>
            <div class="features-wrap" id="wgDetailsList"></div>
        </div>

        <!-- Ausstattung (Nur Wohnungen) -->
        <div id="featuresSection" style="display:none;">
            <div class="section-title" id="featuresTitle"></div>
            <div class="features-wrap" id="featuresList"></div>
        </div>

        <!-- Moebel (Nur Wohnungen) -->
        <div id="furnitureSection" style="display:none;">
            <div class="section-title" id="furnitureTitle"></div>
            <div class="features-wrap" id="furnitureList"></div>
        </div>

        <!-- Inklusive Kosten (Nur Wohnungen) -->
        <div id="utilitiesSection" style="display:none;">
            <div class="section-title" id="utilitiesTitle"></div>
            <div class="features-wrap" id="utilitiesList"></div>
        </div>

        <!-- Lage-Infos -->
        <div id="locationInfoSection" style="display:none;">
            <div class="section-title" id="locationInfoTitle"></div>
            <div class="features-wrap" id="locationInfoList"></div>
        </div>

        <!-- Sonstiges -->
        <div id="miscSection" style="display:none;">
            <div class="section-title" id="miscTitle"></div>
            <div class="features-wrap" id="miscList"></div>
        </div>

        <!-- Reinigungsservice Banner (nur Wohnungen) -->
        <div id="cleaningBanner" style="display:none;"></div>

        <!-- Besitzer -->
        <div class="section-title" id="sellerTitle"></div>
        <div class="owner-card" id="ownerCard">
            <div class="owner-avatar" id="ownerAvatar"></div>
            <div class="owner-info">
                <h4 id="ownerName"></h4>
                <p id="viewProfileText"></p>
            </div>
            <div class="owner-arrow">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </div>
        </div>

    </div>

    <!-- Footer Action Bar -->
    <div class="action-bar">
        <button class="btn-fav" id="favBtn" onclick="toggleFavorite()">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        </button>
        <button class="btn-contact" id="contactBtn"></button>
        <button class="btn-report-small" id="reportBtnBar" onclick="reportListing()">⚠️</button>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.14"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script src="room8-ui.js"></script>
<script src="navigation.js"></script>
<script src="notificationBell.js"></script>
<script src="notificationHelpers.js"></script>
<script src="verifyGate.js"></script>
<script>
    // Supabase Client - Direkte Initialisierung
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Translation Helper
    var tr = (typeof Room8i18n !== 'undefined') ? Room8i18n.t : function(k) { return k; };

    // XSS Protection
    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // URL Params
    const urlParams = new URLSearchParams(window.location.search);
    const listingId = urlParams.get('id');
    
    var currentListing = null;
    var isFavorited = false;
    var currentUserId = null;

    // Navigation Helper
    function navigateTo(url) {
        try { window.location.href = url; } catch(e) { console.warn(e); }
    }

    async function loadDetails() {
        if (!listingId || !sb) return;

        try {
            // 1. User check (fuer Favorite Button)
            const { data: { user } } = await sb.auth.getUser();
            currentUserId = user ? user.id : null;

            // Verifizierungs-Status merken fuer Blur
            var isVerifiedUser = false;
            if (user) {
                const { data: myProfile } = await sb.from('profiles').select('is_verified, is_student_verified').eq('id', user.id).single();
                isVerifiedUser = myProfile && (myProfile.is_verified || myProfile.is_student_verified);
            }

            // 2. Listing laden (inkl. Owner Profile)
            const { data: listing, error } = await sb
                .from('listings')
                .select(`
                    *,
                    owner:owner_id (
                        id,
                        full_name,
                        username,
                        avatar_url,
                        created_at
                    )
                `)
                .eq('id', listingId)
                .single();

            if (error) throw error;
            currentListing = listing;

            // Navigation Highlight basierend auf Typ
            window.currentListingType = listing.type;
            setTimeout(function() {
                var navItems = document.querySelectorAll('.bottom-nav-item');
                navItems.forEach(function(item) {
                    item.classList.remove('active', 'active-housing', 'active-marketplace');
                });
                if (listing.type === 'wohnung') {
                    var wohnenNav = document.querySelector('.bottom-nav-item[data-href="wohnungen.html"]');
                    if (wohnenNav) wohnenNav.classList.add('active-housing');
                } else if (listing.type === 'gegenstand') {
                    var marktNav = document.querySelector('.bottom-nav-item[data-href="gegenstaende.html"]');
                    if (marktNav) marktNav.classList.add('active-marketplace');
                }
            }, 200);

            // 3. UI befüllen
            fillUI(listing);

            // 4. Bilder laden
            loadImages(listingId);

            // 5. Favorite Status checken
            if (currentUserId) checkFavoriteStatus();

            // 6. Eigenes Inserat: Favoriten/Melden-Buttons verstecken, Kontakt zu Bearbeiten
            if (currentUserId && listing.owner_id === currentUserId) {
                document.getElementById('favBtn').style.display = 'none';
                document.getElementById('reportBtnBar').style.display = 'none';
                document.getElementById('contactBtn').textContent = tr('detail_edit_listing');
                document.getElementById('contactBtn').onclick = function() {
                    var editPage = listing.type === 'wohnung' ? 'wohnung.html' : 'gegenstand.html';
                    navigateTo(editPage + '?id=' + listingId);
                };
            } else {
                // 7. View Counter inkrementieren (nur fuer fremde Inserate)
                sb.from('listings')
                    .update({ view_count: (listing.view_count || 0) + 1 })
                    .eq('id', listingId)
                    .then(() => console.log('View count incremented'));
            }

            // Blur-Overlay fuer nicht-verifizierte User
            var isOwner = currentUserId && listing.owner_id === currentUserId;
            if (!isVerifiedUser && !isOwner) {
                showVerifyOverlay(['.detail-content', '#sliderWrapper'], tr('verify_default_message'));
                var actionBar = document.querySelector('.action-bar');
                if (actionBar) actionBar.style.display = 'none';
            }

        } catch (err) {
            console.error(err);
            document.getElementById('title').textContent = tr('detail_error_loading');
            document.getElementById('description').textContent = tr('detail_error_loading');
        }
    }

    function fillUI(l) {
        // Section Titles uebersetzen
        document.getElementById('descTitle').textContent = tr('detail_description');
        document.getElementById('seekerTitle').textContent = tr('detail_seeker_about');
        document.getElementById('wgPrefTitle').textContent = tr('detail_wg_preferences');
        document.getElementById('swapTitle').textContent = tr('detail_swap_details');
        document.getElementById('roomsTitle').textContent = tr('detail_rooms');
        document.getElementById('bathroomTitle').textContent = tr('detail_bathroom');
        document.getElementById('kitchenTitle').textContent = tr('detail_kitchen');
        document.getElementById('wgDetailsTitle').textContent = tr('detail_wg_details');
        document.getElementById('featuresTitle').textContent = tr('detail_features');
        document.getElementById('furnitureTitle').textContent = tr('detail_furniture_section');
        document.getElementById('utilitiesTitle').textContent = tr('detail_utilities_included');
        document.getElementById('locationInfoTitle').textContent = tr('detail_location_info');
        document.getElementById('miscTitle').textContent = tr('detail_miscellaneous');
        document.getElementById('sellerTitle').textContent = tr('detail_seller');

    // === RENDER FUNCTIONS ===

    function renderTags(sectionId, listId, dataObj, labelsMap) {
        if (!dataObj) return;
        const list = document.getElementById(listId);
        let hasItems = false;
        
        for (const [key, label] of Object.entries(labelsMap)) {
            if (dataObj[key]) {
                list.innerHTML += `<span class="feature-tag">✅ ${label}</span>`;
                hasItems = true;
            }
        }
        
        if (hasItems) document.getElementById(sectionId).style.display = 'block';
    }

    function renderRooms(roomsData) {
        const grid = document.getElementById('roomsGrid');
        let hasItems = false;

        var roomTypeLabels = {
            'private': tr('detail_toilet_private'),
            'shared': tr('detail_toilet_shared'),
            'none': '-',
            'in_bath': tr('detail_bathroom'),
            'separate': tr('detail_separate')
        };

        function addRoom(icon, label, value) {
            if (!value) return;
            grid.innerHTML += `
                <div class="room-item">
                    <span class="room-icon">${icon}</span>
                    <div class="room-info">
                        <span class="room-label">${label}</span>
                        <span class="room-value">${roomTypeLabels[value] || value}</span>
                    </div>
                </div>`;
            hasItems = true;
        }

        addRoom('\uD83D\uDEBF', tr('detail_bathroom'), roomsData.bathroom_type);
        addRoom('\uD83C\uDF73', tr('detail_kitchen'), roomsData.kitchen_type);
        addRoom('\uD83D\uDECB\uFE0F', tr('detail_living_room'), roomsData.livingroom_type);
        addRoom('\uD83D\uDEBD', 'WC', roomsData.toilet_type);

        if (roomsData.bathroom_count && roomsData.bathroom_count > 1) {
            grid.innerHTML += `
                <div class="room-item">
                    <span class="room-icon">🔢</span>
                    <div class="room-info">
                        <span class="room-label">${tr('detail_bathroom')} #</span>
                        <span class="room-value">${roomsData.bathroom_count}</span>
                    </div>
                </div>`;
            hasItems = true;
        }

        if (hasItems) document.getElementById('roomsSection').style.display = 'block';
    }

    function renderSeekerProfile(profile) {
        const box = document.getElementById('seekerProfileBox');
        
        const genderEmoji = {
            'male': '👨',
            'female': '👩',
            'diverse': '🧑',
            'no_answer': '👤'
        };

        var hobbyLabels = {
            'sport': '\uD83C\uDFC3 ' + tr('detail_hobby_sport'),
            'music': '\uD83C\uDFB5 ' + tr('detail_hobby_music'),
            'gaming': '\uD83C\uDFAE ' + tr('detail_hobby_gaming'),
            'cooking': '\uD83C\uDF73 ' + tr('detail_hobby_cooking'),
            'reading': '\uD83D\uDCDA ' + tr('detail_hobby_reading'),
            'movies': '\uD83C\uDFAC ' + tr('detail_hobby_film'),
            'travel': '\u2708\uFE0F ' + tr('detail_hobby_travel'),
            'party': '\uD83C\uDF89 ' + tr('detail_hobby_party'),
            'nature': '\uD83C\uDF33 ' + tr('detail_hobby_nature'),
            'art': '\uD83C\uDFA8 ' + tr('detail_hobby_art')
        };

        let html = `<div class="seeker-header">`;
        html += `<div class="seeker-avatar">${genderEmoji[profile.gender] || '👤'}</div>`;
        html += `<div>`;
        
        let meta = [];
        if (profile.age) meta.push(profile.age + ' ' + tr('detail_age_years'));
        if (profile.occupation) meta.push(profile.occupation);
        if (profile.semester) meta.push(profile.semester);
        
        html += `<div class="seeker-name">${meta.length > 0 ? meta[0] : tr('detail_seeker_default')}</div>`;
        if (meta.length > 1) html += `<div class="seeker-meta">${meta.slice(1).join(' • ')}</div>`;
        html += `</div></div>`;

        if (profile.about_text) {
            html += `<div class="seeker-about">${profile.about_text}</div>`;
        }

        // Situation Tags
        let tags = [];
        if (profile.is_smoker) tags.push('\uD83D\uDEAC ' + tr('detail_smoker'));
        if (profile.has_pet) tags.push('\uD83D\uDC3E ' + tr('detail_has_pet') + (profile.pet_type ? ' (' + profile.pet_type + ')' : ''));
        if (profile.needs_anmeldung) tags.push('\uD83D\uDCCB ' + tr('detail_needs_registration'));

        var flexLabels = {
            'immediate': '\u26A1 ' + tr('detail_immediate'),
            '1-2_weeks': '\uD83D\uDCC5 1-2 Weeks',
            '1_month': '\uD83D\uDDD3\uFE0F ~1 Month',
            'flexible': '\uD83D\uDD04 ' + tr('detail_flex_very')
        };
        if (profile.move_flexibility && flexLabels[profile.move_flexibility]) {
            tags.push(flexLabels[profile.move_flexibility]);
        }

        if (tags.length > 0) {
            html += `<div class="features-wrap" style="margin-bottom: 0.75rem;">`;
            tags.forEach(t => html += `<span class="feature-tag">${t}</span>`);
            html += `</div>`;
        }

        // Hobbys
        if (profile.hobbies && profile.hobbies.length > 0) {
            html += `<div class="hobby-tags">`;
            profile.hobbies.forEach(h => {
                if (hobbyLabels[h]) html += `<span class="hobby-tag">${hobbyLabels[h]}</span>`;
            });
            html += `</div>`;
        }

        box.innerHTML = html;
        document.getElementById('seekerProfileSection').style.display = 'block';
    }

        let html = `<div class="swap-title">\uD83D\uDD04 ${tr('detail_swap_offer_title')}</div>`;

        if (swapData.swap_type) {
            html += `<div class="swap-detail-row"><span class="swap-label">${tr('detail_swap_type')}:</span><span class="swap-value">${swapTypeLabels[swapData.swap_type] || swapData.swap_type}</span></div>`;
        }

        if (swapData.swap_reason) {
            html += `<div class="swap-detail-row"><span class="swap-label">${tr('detail_swap_reason')}:</span><span class="swap-value">${reasonLabels[swapData.swap_reason] || swapData.swap_reason}</span></div>`;
        }

        if (swapData.target_city) {
            html += `<div class="swap-detail-row"><span class="swap-label">${tr('detail_swap_target_city')}:</span><span class="swap-value">${swapData.target_city}${swapData.target_district ? ', ' + swapData.target_district : ''}</span></div>`;
        }

        if (swapData.min_size) {
            html += `<div class="swap-detail-row"><span class="swap-label">${tr('detail_swap_min_size')}:</span><span class="swap-value">${swapData.min_size} m\u00B2</span></div>`;
        }

        if (swapData.max_rent) {
            html += `<div class="swap-detail-row"><span class="swap-label">${tr('detail_swap_max_rent')}:</span><span class="swap-value">${swapData.max_rent} \u20AC</span></div>`;
        }

        if (swapData.swap_from && swapData.swap_to) {
            html += `<div class="swap-detail-row"><span class="swap-label">${tr('detail_swap_duration')}:</span><span class="swap-value">${formatDate(swapData.swap_from)} - ${formatDate(swapData.swap_to)}</span></div>`;
        }

        // Flexibilitaet
        let flex = [];
        if (swapData.surcharge_ok) flex.push('\uD83D\uDCB0 ' + tr('detail_swap_surcharge_ok'));
        if (swapData.time_flexible) flex.push('\uD83D\uDCC5 ' + tr('detail_swap_time_flexible'));
        if (swapData.landlord_informed) flex.push('\u2705 ' + tr('detail_swap_landlord_informed'));

        if (flex.length > 0) {
            html += `<div style="margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.4rem;">`;
            flex.forEach(f => html += `<span class="feature-tag" style="font-size: 0.75rem;">${f}</span>`);
            html += `</div>`;
        }

        box.innerHTML = html;
        document.getElementById('swapSection').style.display = 'block';
    }

    async function loadImages(id) {
        const { data: photos } = await sb
            .from('listing_photos')
            .select('storage_path')
            .eq('listing_id', id)
            .order('display_order');

        const wrapper = document.getElementById('sliderWrapper');
        const dots = document.getElementById('sliderDots');
        
        if (photos && photos.length > 0) {
            wrapper.innerHTML = ''; // Remove placeholder
            
            photos.forEach((p, index) => {
                const { data } = sb.storage.from('listing-images').getPublicUrl(p.storage_path);
                if (data) {
                    // Slide add
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    slide.innerHTML = `<img src="${data.publicUrl}" loading="lazy">`;
                    wrapper.appendChild(slide);

                    // Dot add
                    const dot = document.createElement('div');
                    dot.className = 'dot' + (index === 0 ? ' active' : '');
                    dots.appendChild(dot);
                }
            });
        }
    }

    // Helpers
    function formatRoomType(type) {
        const map = { 'wg_room': tr('detail_room_wg'), 'entire_apartment': tr('detail_room_apartment'), 'studio': tr('detail_room_studio'), 'house': tr('detail_room_house'), 'shared_room': tr('detail_room_shared_room') };
        return map[type] || type;
    }

    function formatDate(dateStr) {
        if (!dateStr) return tr('detail_immediate');
        var lang = localStorage.getItem('room8_language') || 'de';
        return new Date(dateStr).toLocaleDateString(lang === 'en' ? 'en-US' : 'de-DE');
    }

    // Favorites Logic
    async function checkFavoriteStatus() {
        const { data } = await sb.from('favorites').select('id').eq('listing_id', listingId).eq('user_id', currentUserId);
        if (data && data.length > 0) {
            isFavorited = true;
            updateFavBtn();
        }
    }

    async function toggleFavorite() {
        if (!currentUserId) {
            if(confirm(tr('detail_please_login'))) navigateTo('login.html');
            return;
        }

        // Eigenes Inserat kann nicht favorisiert werden
        if (currentListing && currentListing.owner_id === currentUserId) {
            Room8UI.warning(tr('detail_cant_favorite_own'));
            return;
        }

        const btn = document.getElementById('favBtn');
        const wasNotFavorited = !isFavorited;

        // Optimistic Update
        isFavorited = !isFavorited;
        updateFavBtn();

        if (isFavorited) {
            await sb.from('favorites').insert({ user_id: currentUserId, listing_id: listingId });

            // Send notification to listing owner (only when adding to favorites)
            if (wasNotFavorited && currentListing && currentListing.owner_id && currentListing.owner_id !== currentUserId && window.NotificationHelpers) {
                try {
                    var profileRes = await sb.from('profiles').select('username, full_name').eq('id', currentUserId).single();
                    var faverName = profileRes.data ? (profileRes.data.full_name || profileRes.data.username || 'Jemand') : 'Jemand';
                    NotificationHelpers.notifyFavorite(currentListing.owner_id, faverName, currentListing.title, listingId);
                } catch(e) { console.log('Notification error:', e); }
            }
        } else {
            await sb.from('favorites').delete().eq('user_id', currentUserId).eq('listing_id', listingId);
        }
    }

    function updateFavBtn() {
        const btn = document.getElementById('favBtn');
        if (isFavorited) {
            btn.classList.add('active');
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#EF4444" stroke="#EF4444" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
        } else {
            btn.classList.remove('active');
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
        }
    }
    
    // Reporting Function
    function reportListing() {
        if (!currentUserId) {
            Room8UI.warning(tr('detail_report_login_required'));
            return;
        }

        // Pruefen ob User eigenes Inserat melden will
        if (currentListing && currentListing.owner_id === currentUserId) {
            Room8UI.warning(tr('detail_report_cant_own'));
            return;
        }

        // Vordefinierte Melde-Gruende
        const reasons = [
            tr('detail_report_fraud'),
            tr('detail_report_wrong_info'),
            tr('detail_report_rented'),
            tr('detail_report_spam'),
            tr('detail_report_images'),
            tr('detail_report_other')
        ];
        const reasonList = reasons.map((r, i) => `${i + 1}. ${r}`).join('\n');
        const choice = prompt(`${tr('detail_report_prompt')}\n\n${reasonList}\n\n${tr('detail_report_enter_number')}`);
        if (choice) {
            const idx = parseInt(choice) - 1;
            const reason = (idx >= 0 && idx < reasons.length) ? reasons[idx] : choice;
            sb.from('reports').insert({
                reporter_id: currentUserId,
                reported_type: 'listing',
                reported_id: listingId,
                reason: reason,
                status: 'open'
            }).then(({ error }) => {
                if (error) Room8UI.error(tr('detail_report_sent_error'));
                else Room8UI.success(tr('detail_report_sent_success'));
            });
        }
    }

    // Init
    loadDetails();

</script>
