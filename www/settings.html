<!DOCTYPE html>

<head>
    <script src="sentry-init.js"></script>

    <style>
        /* Pattern: Magic UI BlurFade */
        @keyframes blurFadeIn {
            from { opacity: 0; filter: blur(8px); transform: translateY(8px); }
            to { opacity: 1; filter: blur(0px); transform: translateY(0); }
        }

        /* Pattern: MagicCard Glasmorphismus fuer Profile-Header */
        .settings-header {
            display: flex;
            align-items: center;
            padding: 1.25rem;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            margin-bottom: 1.25rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.6);
            cursor: pointer;
            transition: transform 0.2s;
            animation: blurFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        .settings-header:active {
            transform: scale(0.98);
        }

        .user-avatar-small {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #EFF6FF, #DBEAFE);
            color: #3B82F6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 700;
            margin-right: 1rem;
            background-size: cover;
            background-position: center;
            border: 2px solid rgba(59,130,246,0.1);
        }

        .user-info h2 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .user-info p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .settings-group {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 1.25rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.04);
            animation: blurFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.08s both;
        }

        .settings-item {
            display: flex;
            align-items: center;
            padding: 0.85rem 1.15rem;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            color: var(--text-main);
            text-decoration: none;
            transition: background 0.15s;
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-item:active {
            background-color: #FAFAFA;
        }

        .item-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.85rem;
            font-size: 1.1rem;
        }

        /* Icon Colors - Koralle zu Blau geaendert */
        .icon-profile { background: #EFF6FF; color: #3B82F6; }
        .icon-notify { background: #FFFBEB; color: #F59E0B; }
        .icon-search { background: #ECFDF5; color: #10B981; }
        .icon-legal { background: #F3F4F6; color: #6B7280; }
        .icon-logout { background: #FEE2E2; color: #EF4444; }
        .icon-delete { background: #FEE2E2; color: #DC2626; }
        .delete-btn { color: #DC2626; font-weight: 600; }
        .icon-admin { background: #111827; color: #FBBF24; }
        .icon-blocked { background: #FEE2E2; color: #991B1B; }

        .item-text {
            flex: 1;
            font-size: 0.92rem;
            font-weight: 500;
        }

        .item-arrow {
            color: #D1D5DB;
            width: 18px;
            height: 18px;
        }

        .logout-btn {
            color: #EF4444;
            font-weight: 600;
        }

        .section-label {
            margin: 0 0 0.4rem 0.5rem;
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .version-info {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 2rem;
            opacity: 0.5;
        }

        /* ADMIN SECTION */
        .admin-section {
            display: none;
        }

        .admin-section.visible {
            display: block;
        }

        /* Pattern: Kibo UI Pill fuer Admin-Badge */
        .admin-badge {
            background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
            color: #111827;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            margin-left: 0.5rem;
            text-transform: uppercase;
        }

        @media (prefers-reduced-motion: reduce) {
            .settings-header, .settings-group { animation: none; opacity: 1; }
        }
    </style>
</head>

<script>
    // Init
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function navigateTo(url) {
        try {
            window.location.href = url;
        } catch (e) {
            console.warn("Navigation blockiert:", e);
        }
    }

    async function loadUser() {
        if (!supabase) return;

        var result = await sb.auth.getUser();
        var user = result.data ? result.data.user : null;
        
        if (!user) {
            navigateTo('login.html');
            return;
        }

        // Profil laden (inklusive is_admin fuer Admin-Bereich)
        var profileResult = await sb
            .from('profiles')
            .select('username, email, full_name, avatar_url, is_admin')
            .eq('id', user.id)
            .single();

        var profile = profileResult.data;

        // ADMIN CHECK via profiles.is_admin (NICHT Email-String)
        if (profile && profile.is_admin === true) {
            document.getElementById('adminSection').classList.add('visible');
        }

        if (profile) {
            var displayName = profile.full_name || profile.username || 'Benutzer';
            document.getElementById('userName').textContent = displayName;
            document.getElementById('userEmail').textContent = profile.email || user.email;

            if (profile.avatar_url) {
                var avatarEl = document.getElementById('userAvatar');
                avatarEl.style.backgroundImage = 'url(' + profile.avatar_url + ')';
                avatarEl.textContent = '';
            } else {
                document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();
            }
        }
    }

    var T = function(k, fb){ return (window.Room8i18n && Room8i18n.t) ? Room8i18n.t(k) : fb; };
    document.getElementById('logoutBtn').addEventListener('click', async function() {
        if (confirm(T('common_logout_confirm', 'Möchtest du dich wirklich abmelden?'))) {
            // FCM Token löschen damit keine Push an dieses Gerät gehen
            try {
                var auth = await sb.auth.getUser();
                if (auth.data.user) {
                    await sb.from('profiles').update({ fcm_token: null }).eq('id', auth.data.user.id);
                }
            } catch (e) {
                console.warn('Token cleanup failed:', e);
            }
            // Alle Push-Daten aufräumen
            localStorage.removeItem('push_token');
            localStorage.removeItem('push_enabled');
            // Alte Notifications aus dem Notification Center löschen
            try {
                if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.PushNotifications) {
                    window.Capacitor.Plugins.PushNotifications.removeAllDeliveredNotifications();
                }
            } catch (e) { /* Web-Fallback, kein Capacitor */ }
            // PushService Reset damit neuer User frisch initialisiert
            if (window.PushService) {
                window.PushService._initialized = false;
            }
            await sb.auth.signOut();
            navigateTo('login.html');
        }
    });
     // Konto löschen
document.getElementById('deleteAccountBtn').addEventListener('click', async function() {
    var deleteWord = T('settings_delete_keyword', 'LOESCHEN');
    var confirmText = prompt(T('settings_delete_prompt', 'Um dein Konto zu loeschen, gib LOESCHEN ein:'));
    if (confirmText !== deleteWord && confirmText !== 'LÖSCHEN' && confirmText !== 'DELETE') {
        Room8UI.info(T('settings_delete_invalid', 'Eingabe falsch. Konto wurde nicht geloescht.'));
        return;
    }

    if (!confirm(T('settings_delete_final_confirm', 'Bist du WIRKLICH sicher? Alle deine Daten werden unwiderruflich geloescht!'))) {
        return;
    }

    try {
        var result = await sb.auth.getUser();
        var user = result.data ? result.data.user : null;
        if (!user) return;

        Room8UI.info(T('settings_deleting_data', 'Lösche deine Daten...'));

        // 1. Listing-Fotos aus Storage löschen
        try {
            const { data: photos } = await sb.from('listing_photos').select('storage_path').eq('user_id', user.id);
            if (photos && photos.length > 0) {
                const paths = photos.map(p => p.storage_path);
                await sb.storage.from('listing-images').remove(paths);
            }
        } catch (e) { console.log('Storage cleanup error:', e); }

        // 2. Chat-Bilder aus Storage löschen
        try {
            const { data: chatFiles } = await sb.storage.from('chat-images').list(user.id);
            if (chatFiles && chatFiles.length > 0) {
                const chatPaths = chatFiles.map(f => user.id + '/' + f.name);
                await sb.storage.from('chat-images').remove(chatPaths);
            }
        } catch (e) { console.log('Chat images cleanup error:', e); }

        // 3. Avatar aus Storage löschen
        try {
            const { data: avatarFiles } = await sb.storage.from('avatars').list(user.id);
            if (avatarFiles && avatarFiles.length > 0) {
                const avatarPaths = avatarFiles.map(f => user.id + '/' + f.name);
                await sb.storage.from('avatars').remove(avatarPaths);
            }
        } catch (e) { console.log('Avatar cleanup error:', e); }

        // 4. Alle Datenbank-Einträge löschen
        await sb.from('listing_photos').delete().eq('user_id', user.id);
        await sb.from('listings').delete().eq('owner_id', user.id);
        await sb.from('messages').delete().eq('sender_id', user.id);
        await sb.from('messages').delete().eq('receiver_id', user.id);
        await sb.from('favorites').delete().eq('user_id', user.id);
        await sb.from('notifications').delete().eq('user_id', user.id);
        await sb.from('reviews').delete().eq('reviewer_id', user.id);
        await sb.from('reviews').delete().eq('reviewee_id', user.id);
        await sb.from('reports').delete().eq('reporter_id', user.id);
        await sb.from('saved_searches').delete().eq('user_id', user.id);
        await sb.from('profiles').delete().eq('id', user.id);

        // 5. Auth-User löschen (via Edge Function)
        try {
            await sb.functions.invoke('delete-user', { body: { userId: user.id } });
        } catch (e) {
            console.log('Auth deletion needs Edge Function:', e);
        }

        await sb.auth.signOut();

        Room8UI.success(T('settings_delete_success', 'Dein Konto wurde gelöscht. Auf Wiedersehen!'));
        setTimeout(function() { navigateTo('login.html'); }, 1500);
    } catch (err) {
        console.error('Fehler beim Löschen:', err);
        Room8UI.error(T('common_error_prefix', 'Fehler: ') + err.message);
    }
});

    loadUser();

    // Sprach-Switcher Logik
    function refreshLangPills() {
        var current = (window.Room8i18n && Room8i18n.getCurrentLanguage && Room8i18n.getCurrentLanguage()) || localStorage.getItem('room8_language') || 'de';
        var de = document.getElementById('lang-pill-de');
        var en = document.getElementById('lang-pill-en');
        if (de) de.classList.toggle('active', current === 'de');
        if (en) en.classList.toggle('active', current === 'en');
    }
    document.querySelectorAll('.lang-pill').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var lang = btn.getAttribute('data-lang');
            if (window.Room8i18n && Room8i18n.setLanguage) {
                Room8i18n.setLanguage(lang);
            } else {
                localStorage.setItem('room8_language', lang);
            }
            refreshLangPills();
            setTimeout(function(){ window.location.reload(); }, 150);
        });
    });
    refreshLangPills();
    window.addEventListener('load', refreshLangPills);
</script>
