<!DOCTYPE html>
<html lang="de">
<head>
    <script src="sentry-init.js"></script>
    <script src="features.js"></script>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Inserat erstellen - Room8</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
    <style>
        /* Pattern: Magic UI BlurFade */
        @keyframes blurFadeIn {
            from { opacity: 0; filter: blur(8px); transform: translateY(8px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }
        .app-content { animation: blurFadeIn 0.5s ease-out both; }

        /* Header - Gruen mit weisser Schrift */
        .app-header {
            display: grid;
            grid-template-columns: 40px 1fr 40px;
            align-items: center;
            padding: calc(1.5rem + env(safe-area-inset-top)) 1.5rem 1.5rem 1.5rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.25);
            margin-bottom: 1.25rem;
        }
        .app-header h1 {
            color: white !important;
            -webkit-text-fill-color: white !important;
            background: none !important;
            margin: 0;
            font-size: 1.3rem;
            font-weight: 800;
            text-align: center;
        }
        .back-arrow {
            color: white !important;
            background: rgba(255,255,255,0.2) !important;
            border: none !important;
        }

        /* === Spezifische Styles für Upload & Formular === */

        /* Upload Bereich */
        .upload-area {
            background-color: #F9FAFB;
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-md);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background-color: #F2F2F0;
        }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Bilder Vorschau Gitter */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: #fff;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .remove-btn:hover {
            background: #EF4444;
        }

        /* Glasmorphismus Mode Switch */
        .mode-switch {
            display: flex;
            background: rgba(243,244,246,0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 1.5rem;
        }

        .mode-option {
            flex: 1;
            text-align: center;
            padding: 0.6rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            color: var(--text-muted);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mode-option.active {
            background: white;
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            font-weight: 700;
        }
        
        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            display: block;
        }

        .helper-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            display: block;
        }

        .hidden {
            display: none !important;
        }
        /* Barrierefreiheit */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        /* ===== WIZARD ===== */
        #wizardProgressBar { height: 6px; background: #E5E7EB; border-radius: 999px; overflow: hidden; margin-bottom: 1rem; }
        #wizardProgressFill { height: 100%; width: 0%; background: #4F46E5; border-radius: 999px; transition: width 0.3s ease; }
        #wizardHead { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.25rem; }
        #wizardStepCount { font-size: 0.8rem; font-weight: 600; color: #6B7280; letter-spacing: 0.02em; }
        .wbadge-required, .wbadge-optional { font-size: 0.72rem; font-weight: 700; padding: 0.15rem 0.55rem; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.03em; }
        .wbadge-required { background: #FEE2E2; color: #B91C1C; }
        .wbadge-optional { background: #ECFDF5; color: #047857; }
        #wizardTitle { font-size: 1.35rem; font-weight: 700; color: #111827; margin-bottom: 1.1rem; }
        #wizardViewport { min-height: 100px; }
        #wizardNav { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
        #wizardNav button { flex: 1; padding: 0.95rem; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; border: none; }
        #wizardBack { background: #F3F4F6; color: #374151; }
        #wizardBack:disabled { opacity: 0.4; cursor: not-allowed; }
        #wizardNext { background: #4F46E5; color: #fff; }
        #wizardPublish { background: #10B981; color: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <a href="javascript:history.back()" class="back-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <h1 id="pageTitle">Verkaufen</h1>
        <div style="width: 40px;"></div>
    </header>

    <main class="app-content">
        
        <!-- Modus Auswahl -->
        <div class="mode-switch">
            <div class="mode-option active" id="mode-offer" onclick="wizardSwitchMode('offer')">Verkaufen</div>
            <div class="mode-option" id="mode-search" onclick="wizardSwitchMode('search')">Suche</div>
        </div>

        <form id="createForm">

            <!-- ===== WIZARD ===== -->
            <div id="wizardWrap" style="display:none;">
                <div id="wizardProgressBar"><div id="wizardProgressFill"></div></div>
                <div id="wizardHead">
                    <span id="wizardStepCount">Schritt 1</span>
                    <span id="wizardBadge" class="wbadge-optional">Optional</span>
                </div>
                <div id="wizardTitle">Fotos</div>
                <div id="wizardViewport"></div>
                <div id="wizardNav">
                    <button type="button" id="wizardBack" onclick="wizardGoBack()">Zurück</button>
                    <button type="button" id="wizardNext" onclick="wizardGoNext()">Weiter</button>
                    <button type="submit" id="wizardPublish" class="submit-btn" style="display:none;">Veröffentlichen</button>
                </div>
            </div>

            <div id="oldFormBody">
            <!-- Bilder Upload -->
            <div class="form-group" id="imageSection">
                <label class="section-title">Fotos (Max. 5)</label>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <span class="upload-icon">📷</span>
                    <div style="font-size: 0.9rem; color: var(--text-muted);">Tippen zum Auswählen</div>
                </div>
                <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" onchange="handleFiles(this.files)">
                <div class="preview-grid" id="previewGrid"></div>
                <div id="photoCounter" style="text-align: center; font-size: 0.8rem; color: var(--text-light); margin-top: -1rem; margin-bottom: 1rem;">0 / 5 Fotos</div>
            </div>

            <!-- Titel -->
            <div class="form-group" id="aiGenWrap" style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:12px;padding:1rem;">
                <div style="font-weight:600;color:#3730A3;margin-bottom:0.3rem;">✨ Titel & Beschreibung automatisch erstellen</div>
                <div style="font-size:0.85rem;color:#4B5563;margin-bottom:0.75rem;">Lad Fotos hoch und füll Kategorie, Zustand, Preis & Stadt aus — dann schreibt die KI den Text. Du kannst alles anpassen.</div>
                <button type="button" id="aiGenBtn" onclick="generateListingText()" style="width:100%;padding:0.85rem;background:#4F46E5;color:#fff;border:none;border-radius:10px;font-weight:600;font-size:0.95rem;cursor:pointer;">Aus Fotos & Details generieren</button>
            </div>

            <div class="form-group">
                <label for="title">Titel</label>
                <input type="text" id="title" required placeholder="Was möchtest du anbieten?">
            </div>

            <!-- Preis -->
            <div class="form-group" id="price-group">
                <label for="price">Preis (€)</label>
                <input type="number" id="price" required placeholder="0.00" step="0.01">
            </div>
            
            <!-- Preisbereich (nur für Suche) -->
            <div class="form-group hidden" id="price-range-group">
                <label>Preisvorstellung (€)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="price_min" placeholder="Min" step="0.01">
                    <input type="number" id="price_max" placeholder="Max" step="0.01">
                </div>
            </div>

            <!-- Kategorie -->
            <div class="form-group">
                <label for="category" id="label-category">Kategorie</label>
                <select id="category" required>
                    <option value="" disabled selected>Bitte wählen</option>
                    <option value="Furniture & Home">Möbel & Wohnen</option>
                    <option value="Electronics & Tech">Elektronik</option>
                    <option value="Books & Study">Bücher & Studium</option>
                    <option value="Clothing & Fashion">Kleidung</option>
                    <option value="Sports & Outdoor">Sport & Freizeit</option>
                    <option value="Kitchen & Appliances">Küche</option>
                    <option value="Bikes & Transport">Fahrrad & Transport</option>
                    <option value="Music & Instruments">Musik</option>
                    <option value="Others">Sonstiges</option>
                </select>
            </div>

            <!-- Zustand -->
            <div class="form-group" id="condition-group">
                <label for="condition" id="label-condition">Zustand</label>
                <select id="condition" required>
                    <option value="" disabled selected>Bitte wählen</option>
                    <option value="New">Neu</option>
                    <option value="Like New">Wie neu</option>
                    <option value="Good">Gut</option>
                    <option value="Fair">Ok</option>
                    <option value="Poor">Gebraucht</option>
                </select>
                <span class="helper-text hidden" id="condition-helper">Welcher Zustand ist für dich noch akzeptabel?</span>
            </div>

            <!-- Stadt -->
            <div class="form-group">
                <label for="city">Stadt</label>
                <input type="text" id="city" required placeholder="Wo befindet sich der Artikel?" list="citySuggestions">
                <datalist id="citySuggestions"></datalist>
            </div>

            <!-- Beschreibung -->
            <div class="form-group">
                <label for="description">Beschreibung</label>
                <textarea id="description" rows="5" required placeholder="Beschreibe den Artikel genauer..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Veröffentlichen</button>

            </div><!-- /oldFormBody -->
        </form>

    </main>
</div>

<!-- Scripts -->
<script src="lib/supabase.min.js"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script src="session-cache.js"></script>
<script src="room8-ui.js"></script>
<script src="cities.js"></script>
<script src="notificationHelpers.js"></script>

<script>
    // Supabase Client - Direkte Initialisierung
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 3. Stadt-Vorschläge laden
    if (typeof populateCityDatalist === 'function') {
        populateCityDatalist('citySuggestions');
    }

    // Variablen
    var selectedFiles = [];
    var currentMode = 'offer';
    var editListingId = null;
    var existingPhotos = [];

    // URL Parameter checken (z.B. ?mode=search oder ?id=123)
    var urlParams = new URLSearchParams(window.location.search);
    var modeParam = urlParams.get('mode');
    var idParam = urlParams.get('id');

    // ===== Wizard-Daten (vor dem Init noetig, da setMode sie braucht) =====
    var OFFER_STEPS = [
        { t: 'Fotos', b: 'optional', req: [], box: ['#imageSection'] },
        { t: 'Details', b: 'required', req: ['price', 'category', 'city'], box: ['#price-group', '#category', '#condition-group', '#city'] },
        { t: 'Titel & Beschreibung', b: 'required', req: ['title', 'description'], box: ['#aiGenWrap', '#title', '#description'], last: true },
    ];
    var SEARCH_STEPS = [
        { t: 'Was suchst du?', b: 'required', req: ['category', 'city'], box: ['#category', '#price-range-group', '#condition-group', '#city'] },
        { t: 'Titel & Beschreibung', b: 'required', req: ['title', 'description'], box: ['#title', '#description'], last: true },
    ];
    var WIZARD_STEPS = OFFER_STEPS;
    var wizardStep = 0;
    var wizardOn = false;

    if (idParam) {
        editListingId = idParam;
        loadListingForEdit(idParam);
    } else {
        setMode(modeParam || 'offer');
    }

    // Listing laden für Bearbeitung
    async function loadListingForEdit(listingId) {
        try {
            var result = await sb.from('listings').select('*').eq('id', listingId).single();
            if (result.error) throw result.error;

            var listing = result.data;

            // Titel anpassen
            document.getElementById('pageTitle').textContent = 'Inserat bearbeiten';
            document.getElementById('submitBtn').textContent = 'Änderungen speichern';

            // Modus setzen
            if (listing.listing_mode) {
                setMode(listing.listing_mode);
            }

            // Felder füllen
            document.getElementById('title').value = listing.title || '';
            document.getElementById('price').value = listing.price || '';
            document.getElementById('price_min').value = listing.price_range_min || '';
            document.getElementById('price_max').value = listing.price_range_max || '';
            document.getElementById('category').value = listing.category || '';
            document.getElementById('condition').value = listing.condition || '';
            document.getElementById('city').value = listing.city || '';
            document.getElementById('description').value = listing.description || '';

            // Existierende Bilder laden
            var photosResult = await sb.from('listing_photos').select('*').eq('listing_id', listingId).order('display_order');
            if (photosResult.data && photosResult.data.length > 0) {
                existingPhotos = photosResult.data;
                var grid = document.getElementById('previewGrid');

                for (var i = 0; i < photosResult.data.length; i++) {
                    var photo = photosResult.data[i];
                    var publicUrl = sb.storage.from('listing-images').getPublicUrl(photo.storage_path).data.publicUrl;

                    var div = document.createElement('div');
                    div.className = 'preview-item';
                    div.innerHTML = '<img src="' + publicUrl + '">';
                    grid.appendChild(div);
                }
                updateCounter();
            }

        } catch (err) {
            console.error('Fehler beim Laden:', err);
            Room8UI.error('Fehler beim Laden des Inserats: ' + err.message);
        }
    }

    function setMode(mode) {
        currentMode = mode;
        // UI Umschalten
        document.getElementById('mode-offer').className = mode === 'offer' ? 'mode-option active' : 'mode-option';
        document.getElementById('mode-search').className = mode === 'search' ? 'mode-option active' : 'mode-option';

        var pageTitle = document.getElementById('pageTitle');
        var submitBtn = document.getElementById('submitBtn');
        var priceGroup = document.getElementById('price-group');
        var priceRangeGroup = document.getElementById('price-range-group');
        var priceInput = document.getElementById('price');
        var imageSection = document.getElementById('imageSection');
        var conditionSelect = document.getElementById('condition');
        var conditionLabel = document.getElementById('label-condition');
        var conditionHelper = document.getElementById('condition-helper');
        var categoryLabel = document.getElementById('label-category');
        var titleInput = document.getElementById('title');
        var cityInput = document.getElementById('city');
        var descInput = document.getElementById('description');

        if (mode === 'search') {
            pageTitle.textContent = 'Gesuch aufgeben';
            submitBtn.textContent = 'Gesuch veröffentlichen';
            priceGroup.classList.add('hidden');
            priceRangeGroup.classList.remove('hidden');
            priceInput.required = false;
            imageSection.classList.add('hidden');
            conditionSelect.required = false;

            // Labels für Gesuch anpassen
            conditionLabel.textContent = 'Mindest-Zustand';
            conditionHelper.classList.remove('hidden');
            categoryLabel.textContent = 'In welcher Kategorie?';

            // Placeholders für Gesuch anpassen
            titleInput.placeholder = 'Was suchst du?';
            cityInput.placeholder = 'Wo suchst du?';
            descInput.placeholder = 'Beschreibe genauer was du suchst...';
        } else {
            pageTitle.textContent = 'Verkaufen';
            submitBtn.textContent = 'Veröffentlichen';
            priceGroup.classList.remove('hidden');
            priceRangeGroup.classList.add('hidden');
            priceInput.required = true;
            imageSection.classList.remove('hidden');
            conditionSelect.required = true;

            // Labels für Angebot
            conditionLabel.textContent = 'Zustand';
            conditionHelper.classList.add('hidden');
            categoryLabel.textContent = 'Kategorie';

            // Placeholders für Angebot
            titleInput.placeholder = 'Was möchtest du anbieten?';
            cityInput.placeholder = 'Wo befindet sich der Artikel?';
            descInput.placeholder = 'Beschreibe den Artikel genauer...';
        }

        // Wizard aktivieren (nur Inserieren, nicht beim Bearbeiten)
        setupWizard(mode);
    }

    // ===== SCHRITT-FUER-SCHRITT WIZARD =====
    function wizardBoxOf(sel) {
        var el = document.querySelector(sel);
        if (!el) return null;
        if (el.classList.contains('form-group')) return el;
        if (el.id && (el.id.indexOf('group-') === 0 || el.id.indexOf('-group') > 0 || el.id.indexOf('Section') > 0 || el.id.indexOf('Wrap') > 0)) return el;
        return el.closest('.form-group') || el;
    }

    function setupWizard(mode) {
        var wrap = document.getElementById('wizardWrap');
        var oldBody = document.getElementById('oldFormBody');
        var isEdit = (typeof editListingId !== 'undefined' && editListingId);
        if (isEdit) {
            wizardOn = false;
            wrap.style.display = 'none';
            oldBody.style.display = '';
            return;
        }
        WIZARD_STEPS = mode === 'search' ? SEARCH_STEPS : OFFER_STEPS;
        wizardOn = true;
        oldBody.style.display = 'none';
        wrap.style.display = 'block';
        ['title', 'description', 'price', 'category', 'condition', 'city'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.required = false;
        });
        wizardStep = 0;
        renderWizardStep();
    }

    function renderWizardStep() {
        var viewport = document.getElementById('wizardViewport');
        var oldBody = document.getElementById('oldFormBody');
        while (viewport.firstChild) oldBody.appendChild(viewport.firstChild);
        var step = WIZARD_STEPS[wizardStep];
        step.box.forEach(function(sel) {
            var box = wizardBoxOf(sel);
            if (box) viewport.appendChild(box);
        });
        document.getElementById('wizardTitle').textContent = step.t;
        document.getElementById('wizardStepCount').textContent = 'Schritt ' + (wizardStep + 1) + ' von ' + WIZARD_STEPS.length;
        var badge = document.getElementById('wizardBadge');
        badge.textContent = step.b === 'required' ? 'Pflicht' : 'Optional';
        badge.className = step.b === 'required' ? 'wbadge-required' : 'wbadge-optional';
        document.getElementById('wizardProgressFill').style.width = ((wizardStep + 1) / WIZARD_STEPS.length * 100) + '%';
        document.getElementById('wizardBack').disabled = (wizardStep === 0);
        document.getElementById('wizardNext').style.display = step.last ? 'none' : '';
        document.getElementById('wizardPublish').style.display = step.last ? '' : 'none';
        viewport.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function wizardValidate() {
        var step = WIZARD_STEPS[wizardStep];
        for (var i = 0; i < step.req.length; i++) {
            var el = document.getElementById(step.req[i]);
            if (el && !String(el.value || '').trim()) {
                Room8UI.warning('Bitte dieses Pflichtfeld ausfüllen.');
                el.focus();
                return false;
            }
        }
        return true;
    }

    function wizardGoNext() {
        if (!wizardValidate()) return;
        if (wizardStep < WIZARD_STEPS.length - 1) { wizardStep++; renderWizardStep(); }
    }

    function wizardGoBack() {
        if (wizardStep > 0) { wizardStep--; renderWizardStep(); }
    }

    function wizardSwitchMode(m) {
        if (m === currentMode) return;
        var qs = '?mode=' + m;
        var ed = new URLSearchParams(window.location.search).get('edit');
        if (ed) qs += '&edit=' + ed;
        window.location.href = window.location.pathname + qs;
    }

    // ===== KI-Generierung: Titel + Beschreibung aus Fotos + Details =====
    function fileToDataUrl(file) {
        return new Promise(function(resolve, reject) {
            var reader = new FileReader();
            reader.onload = function() { resolve(reader.result); };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    async function generateListingText() {
        var btn = document.getElementById('aiGenBtn');
        var catEl = document.getElementById('category');
        var city = document.getElementById('city').value.trim();
        var price = document.getElementById('price').value;
        if (!catEl.value || !city) {
            Room8UI.warning('Bitte erst Kategorie und Stadt ausfüllen.');
            return;
        }
        function txt(id) { var el = document.getElementById(id); if (!el) return null; if (el.tagName === 'SELECT') { var o = el.options[el.selectedIndex]; return o ? o.text : null; } return el.value || null; }
        var facts = {
            kategorie: txt('category'),
            zustand: txt('condition'),
            preis: price || null,
            stadt: city,
        };
        var oldTxt = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'KI schreibt …';
        try {
            var images = [];
            for (var i = 0; i < Math.min(selectedFiles.length, 3); i++) images.push(await fileToDataUrl(selectedFiles[i]));
            var sess = await sb.auth.getSession();
            var token = sess.data.session && sess.data.session.access_token;
            if (!token) { Room8UI.warning('Bitte erst einloggen.'); return; }
            var resp = await fetch(SUPABASE_URL + '/functions/v1/generate-listing', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ type: 'gegenstand', facts: facts, images: images })
            });
            var data = await resp.json();
            if (!resp.ok) { Room8UI.error('Konnte nicht generieren: ' + (data.error || resp.status)); return; }
            if (data.title) document.getElementById('title').value = data.title;
            if (data.description) document.getElementById('description').value = data.description;
            Room8UI.success('Titel und Beschreibung erstellt — schau drüber und passe an!');
        } catch (e) {
            Room8UI.error('Fehler: ' + e.message);
        } finally {
            btn.disabled = false;
            btn.textContent = oldTxt;
        }
    }

    // Datei Handling
    function handleFiles(files) {
        var grid = document.getElementById('previewGrid');
        
        for (var i = 0; i < files.length; i++) {
            if (selectedFiles.length >= 5) break; // Max 5
            
            var file = files[i];
            selectedFiles.push(file);

            // Vorschau Element bauen
            var div = document.createElement('div');
            div.className = 'preview-item';
            
            var img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            
            var btn = document.createElement('button');
            btn.className = 'remove-btn';
            btn.innerHTML = '×';
            // Wir nutzen Closure, um den Index zu merken
            btn.onclick = (function(index, element) {
                return function(e) { 
                    e.preventDefault(); 
                    removeFile(index, element); 
                };
            })(selectedFiles.length - 1, div);

            div.appendChild(img);
            div.appendChild(btn);
            grid.appendChild(div);
        }
        updateCounter();
    }

    function removeFile(index, element) {
        element.remove();
        selectedFiles[index] = null; // Als gelöscht markieren
        updateCounter();
    }

    function updateCounter() {
        var activeCount = selectedFiles.filter(f => f !== null).length + existingPhotos.length;
        document.getElementById('photoCounter').textContent = activeCount + ' / 5 Fotos';

        // Upload Button ausblenden wenn voll
        var uploadArea = document.querySelector('.upload-area');
        if (activeCount >= 5) {
            uploadArea.style.display = 'none';
        } else {
            uploadArea.style.display = 'block';
        }
    }

    // Formular Absenden
    document.getElementById('createForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        // Wizard-Guard: Titel + Beschreibung muessen da sein
        if (wizardOn) {
            var tEl = document.getElementById('title');
            var dEl = document.getElementById('description');
            if (!String(tEl.value || '').trim() || !String(dEl.value || '').trim()) {
                Room8UI.warning('Bitte Titel und Beschreibung ausfüllen — die KI kann das aus deinen Fotos erstellen.');
                wizardStep = WIZARD_STEPS.length - 1;
                renderWizardStep();
                return;
            }
        }

        var btn = document.getElementById('submitBtn');
        btn.disabled = true;
        var originalText = btn.textContent;
        btn.innerHTML = '<span class="btn-spin"></span>Wird gespeichert...';

        try {
            // 1. Auth Check
            var { data: { user } } = await sb.auth.getUser();
            if (!user) {
                Room8UI.warning("Bitte erst einloggen.");
                setTimeout(function() { window.location.href = 'login.html'; }, 1500);
                return;
            }

            // 2. Daten sammeln
            var title = document.getElementById('title').value;
            var category = document.getElementById('category').value;
            var condition = document.getElementById('condition').value;
            var city = (typeof normalizeCity === 'function' ? normalizeCity(document.getElementById('city').value) : document.getElementById('city').value.trim());
            var description = document.getElementById('description').value;
            
            var price = null;
            var priceMin = null;
            var priceMax = null;

            if (currentMode === 'offer') {
                price = document.getElementById('price').value;
            } else {
                priceMin = document.getElementById('price_min').value || null;
                priceMax = document.getElementById('price_max').value || null;
            }

            // 3. Listing in DB erstellen oder aktualisieren
            var listingData = {
                type: 'gegenstand',
                title: title,
                price: price,
                price_range_min: priceMin,
                price_range_max: priceMax,
                category: category,
                condition: condition,
                city: city,
                description: description,
                listing_mode: currentMode,
                is_active: true
            };

            var listing;
            if (editListingId) {
                // UPDATE
                var updateResult = await sb.from('listings').update(listingData).eq('id', editListingId).select().single();
                if (updateResult.error) throw updateResult.error;
                listing = updateResult.data;
            } else {
                // INSERT
                listingData.owner_id = user.id;
                var insertResult = await sb.from('listings').insert(listingData).select().single();
                if (insertResult.error) throw insertResult.error;
                listing = insertResult.data;
            }

            // 4. Bilder hochladen (nur neue)
            var activeFiles = selectedFiles.filter(f => f !== null);

            if (activeFiles.length > 0) {
                btn.textContent = "Lade Bilder hoch...";
                var startIndex = existingPhotos.length;

                for (var i = 0; i < activeFiles.length; i++) {
                    var file = activeFiles[i];
                    // Browser-side Compression (1600px max, JPEG q82)
                    var fileToUpload = (window.Room8 && Room8.compressImage) ? await Room8.compressImage(file) : file;
                    var fileName = `${listing.id}_${startIndex + i}.jpg`;

                    var uploadResult = await sb.storage.from('listing-images').upload(fileName, fileToUpload);

                    if (uploadResult.error) {
                        console.error("Bild Upload Fehler:", uploadResult.error);
                    } else {
                        await sb.from('listing_photos').insert({
                            listing_id: listing.id,
                            storage_path: fileName,
                            display_order: startIndex + i
                        });
                    }
                }
            }

            // Erfolg!
            Room8UI.success(editListingId ? "Änderungen gespeichert!" : "Erfolgreich erstellt!");

            // Suchaufträge-Treffer: Prüfe ob das neue Inserat zu gespeicherten Suchen passt
            if (!editListingId && listing.city && window.NotificationHelpers) {
                try {
                    var searchQuery = sb
                        .from('saved_searches')
                        .select('*')
                        .eq('search_type', 'gegenstand')
                        .eq('is_active', true)
                        .ilike('city', listing.city)
                        .neq('user_id', user.id);

                    var searchRes = await searchQuery;

                    if (searchRes.data && searchRes.data.length > 0) {
                        var notifiedUsers = {};
                        for (var s of searchRes.data) {
                            if (notifiedUsers[s.user_id]) continue;

                            // Preis-Check (wenn gesetzt)
                            if (s.min_price && listing.price && listing.price < s.min_price) continue;
                            if (s.max_price && listing.price && listing.price > s.max_price) continue;

                            // Kategorie-Check (wenn gesetzt)
                            if (s.category && listing.category && s.category !== listing.category) continue;

                            // Einstellung prüfen
                            var sSettingsRes = await sb
                                .from('notification_settings')
                                .select('saved_search_match')
                                .eq('user_id', s.user_id)
                                .single();

                            var sNotify = !sSettingsRes.data || sSettingsRes.data.saved_search_match !== false;

                            if (sNotify) {
                                await NotificationHelpers.createNotification(
                                    s.user_id,
                                    'saved_search_match',
                                    '\uD83D\uDD14 Neuer Treffer f\u00FCr deine Suche',
                                    listing.title + ' in ' + listing.city,
                                    'listing-details.html?id=' + listing.id,
                                    listing.id
                                );
                                notifiedUsers[s.user_id] = true;
                            }
                        }
                    }
                } catch (searchErr) {
                    console.log('Saved search notification error:', searchErr);
                }
            }

            setTimeout(function() { window.location.href = "gegenstaende.html"; }, 1500);

        } catch (err) {
            console.error(err);
            Room8UI.error("Fehler: " + err.message);
            btn.disabled = false;
            btn.textContent = originalText;
        }
    });
</script>
<script src="notificationBell.js"></script>
</body>
</html>
