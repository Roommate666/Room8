<!DOCTYPE html>
<html lang="de">
<head>
    <script src="sentry-init.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>Passwort vergessen - Room8</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Pattern: Magic UI BlurFade */
    @keyframes blurFadeIn {
        from { opacity: 0; filter: blur(8px); transform: translateY(8px); }
        to { opacity: 1; filter: blur(0px); transform: translateY(0); }
    }
    @keyframes shimmerSlide {
        0%, 100% { left: -100%; }
        50% { left: 100%; }
    }

    .app-container {
        background: linear-gradient(135deg, #3B82F6 0%, #1E40AF 100%);
        min-height: 100vh;
    }

    .app-header {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
    }

    .app-header h1 {
        color: white !important;
    }

    .back-arrow {
        background: rgba(255,255,255,0.15) !important;
        color: white !important;
        border: none !important;
        backdrop-filter: blur(8px) !important;
        -webkit-backdrop-filter: blur(8px) !important;
    }

    .reset-card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 2rem;
        margin: 1rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        text-align: center;
        border: 1px solid rgba(255,255,255,0.6);
        animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .icon-wrapper {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem auto;
        font-size: 2.2rem;
        box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        position: relative;
        overflow: hidden;
    }
    /* Pattern: Magic UI ShineBorder */
    .icon-wrapper::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent 50%, rgba(255,255,255,0.1));
        pointer-events: none;
    }

    .reset-card h2 {
        margin: 0 0 0.5rem 0;
        font-size: 1.4rem;
        font-weight: 800;
        color: #1f2937;
        letter-spacing: -0.02em;
    }

    .reset-card p {
        color: #6b7280;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
        line-height: 1.5;
    }

    .form-group {
        text-align: left;
        margin-bottom: 1.5rem;
    }

    .form-group label {
        font-weight: 600;
        color: #374151;
        font-size: 0.85rem;
    }

    .form-group input {
        width: 100%;
        padding: 0.9rem 1rem;
        border: 1.5px solid #E5E7EB;
        border-radius: 14px;
        font-size: 0.95rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        background: #FAFAFA;
    }

    .form-group input:focus {
        outline: none;
        border-color: #3B82F6;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        background: white;
    }

    /* Pattern: Magic UI ShimmerButton */
    .btn-send {
        width: 100%;
        padding: 0.95rem;
        background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
        color: white;
        border: none;
        border-radius: 999px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.35);
        position: relative;
        overflow: hidden;
    }
    .btn-send::after {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        animation: shimmerSlide 3s ease-in-out infinite;
    }
    .btn-send:active { transform: scale(0.98); }
    .btn-send:disabled {
        opacity: 0.6;
        transform: none;
    }
    .btn-send:disabled::after { animation: none; }

    .success-card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 2.5rem 2rem;
        margin: 1rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        text-align: center;
        display: none;
        border: 1px solid rgba(255,255,255,0.6);
        animation: blurFadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .success-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem auto;
        font-size: 2.2rem;
        box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
    }

    .success-card h3 {
        margin: 0 0 0.75rem 0;
        font-size: 1.3rem;
        font-weight: 800;
        color: #1f2937;
        letter-spacing: -0.02em;
    }

    .success-card p {
        color: #6b7280;
        font-size: 0.9rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
    }

    .btn-back {
        display: inline-block;
        padding: 0.85rem 2rem;
        background: white;
        color: #3B82F6;
        border: 1.5px solid rgba(59,130,246,0.2);
        border-radius: 999px;
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
        transition: transform 0.2s;
    }
    .btn-back:active { transform: scale(0.97); }

    .login-link {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: rgba(255,255,255,0.8);
    }

    .login-link a {
        color: white;
        font-weight: 600;
        text-decoration: none;
    }

    @media (prefers-reduced-motion: reduce) {
        .reset-card, .success-card { animation: none; opacity: 1; }
        .btn-send::after { animation: none; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header class="app-header">
       <a href="login.html" class="back-arrow">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
       </a>
       <h1>Passwort Reset</h1>
       <div style="width: 40px;"></div>
    </header>

    <main class="app-content" style="padding-top: 1rem;">

        <div class="reset-card" id="resetFormContainer">
            <div class="icon-wrapper">
                🔒
            </div>

            <h2>Passwort vergessen?</h2>
            <p>Kein Problem! Gib deine E-Mail-Adresse ein und wir senden dir einen Link zum Zurücksetzen.</p>

            <form id="resetForm">
                <div class="form-group">
                    <label for="resetEmail">E-Mail Adresse</label>
                    <input type="email" id="resetEmail" required placeholder="deine@email.de">
                </div>
                <button type="submit" class="btn-send" id="resetBtn">
                    Link senden
                </button>
            </form>
        </div>

        <div id="successMessage" class="success-card">
            <div class="success-icon">📧</div>
            <h3>E-Mail gesendet!</h3>
            <p>Wir haben dir einen Link zum Zurücksetzen gesendet. Bitte prüfe deinen Posteingang (auch den Spam-Ordner).</p>
            <a href="login.html" class="btn-back">Zurück zum Login</a>
        </div>

        <div class="login-link" style="text-align: center; margin-top: 1.5rem;">
            <a href="login.html">← Zurück zum Login</a>
        </div>

    </main>
  </div>

  <script src="lib/supabase.min.js"></script>
  <script src="config.js"></script>
<script src="translations.js"></script>
<script src="session-cache.js"></script>
  <script src="room8-ui.js"></script>
  <script>
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('resetEmail').value.trim();
        var btn = document.getElementById('resetBtn');

        if(!email) return;

        btn.disabled = true;
        btn.innerHTML = '<span style="opacity:0.8;">Sende...</span>';

        // Redirect URL zur Update-Passwort Seite - immer die Web-Domain nutzen
        var redirectUrl = 'https://room8.club/update-password.html';

        var { data, error } = await sb.auth.resetPasswordForEmail(email, {
            redirectTo: redirectUrl,
        });

        if (error) {
            console.error(error);
            Room8UI.error("Fehler: " + error.message);
            btn.disabled = false;
            btn.textContent = "Link senden";
        } else {
            document.getElementById('resetFormContainer').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
            document.querySelector('.login-link').style.display = 'none';
        }
    });
  </script>
</body>
</html>
