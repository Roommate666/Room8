<!DOCTYPE html>
<html lang="en">
<head>
    <script src="sentry-init.js"></script>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">    <title data-i18n="settings_title">Einstellungen</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
    <style>
        /* Pattern: Magic UI BlurFade */
        @keyframes blurFadeIn {
            from { opacity: 0; filter: blur(8px); transform: translateY(8px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }
        .app-content { animation: blurFadeIn 0.5s ease-out both; }
        .settings-item {
            display: block; width: 100%; text-align: left; padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.92); border: none; border-bottom: 1px solid rgba(0,0,0,0.04);
            font-size: 1rem; cursor: pointer; transition: background 0.2s;
        }
        .settings-item:active { background: rgba(243,244,246,0.88); }
        .settings-item.logout { color: #dc2626; font-weight: 600; }
        .settings-section-label { font-size: 0.75rem; font-weight: 600; color: #6B7280; text-transform: uppercase; letter-spacing: 0.05em; padding: 1.25rem 1.5rem 0.5rem; }
        .lang-row { display: flex; gap: 0.5rem; padding: 0 1.5rem 1rem; }
        .lang-pill { flex: 1; padding: 0.85rem 1rem; border-radius: 999px; border: 1.5px solid #E5E7EB; background: white; font-size: 0.95rem; font-weight: 600; color: #374151; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .lang-pill.active { background: linear-gradient(135deg, #3B82F6, #2563EB); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25); }
        .lang-pill:active { transform: scale(0.97); }
        /* Barrierefreiheit */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <a href="profile.html" class="back-arrow">&#8592;</a>
        <h1 data-i18n="settings_title">Einstellungen</h1>
    </header>
    <main class="app-content" style="padding:0;">
        <div class="settings-section-label" data-i18n="settings_language_section">Sprache</div>
        <div class="lang-row">
            <button class="lang-pill" data-lang="de" id="lang-pill-de">
                <span>Deutsch</span>
            </button>
            <button class="lang-pill" data-lang="en" id="lang-pill-en">
                <span>English</span>
            </button>
        </div>
        <div><button id="logout-button" class="settings-item logout" data-i18n="settings_logout">Ausloggen</button></div>
    </main>
    <footer class="app-footer-nav" id="app-footer-nav"></footer>
</div>
<script src="lib/supabase.min.js"></script>
<script src="config.js"></script>
<script src="session-cache.js"></script>
<script src="translations.js"></script>
<script>
    // Supabase Client - Direkte Initialisierung
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    document.getElementById('logout-button').addEventListener('click', async function() {
        await sb.auth.signOut();
        window.location.href = 'login.html';
    });

    // Sprach-Toggle: Aktiven Status setzen + Wechsel-Logik
    function refreshLangPills() {
        var current = (window.Room8i18n && Room8i18n.getCurrentLanguage && Room8i18n.getCurrentLanguage()) || localStorage.getItem('room8_language') || 'de';
        document.getElementById('lang-pill-de').classList.toggle('active', current === 'de');
        document.getElementById('lang-pill-en').classList.toggle('active', current === 'en');
    }
    document.querySelectorAll('.lang-pill').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var lang = btn.getAttribute('data-lang');
            if (window.Room8i18n && Room8i18n.setLanguage) {
                Room8i18n.setLanguage(lang);
            } else {
                localStorage.setItem('room8_language', lang);
            }
            refreshLangPills();
            // Reload damit alle data-i18n Elemente neu gerendert werden
            setTimeout(function(){ window.location.reload(); }, 150);
        });
    });
    // Init beim Laden + nach translations.js Init
    refreshLangPills();
    window.addEventListener('load', refreshLangPills);
</script>
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<script src="nav.js"></script>
</body>
</html>
