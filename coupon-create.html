<!DOCTYPE html>
<html lang="de">
<head>
    <script src="sentry-init.js"></script>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">    <title>Coupon erstellen - Admin</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
    <style>
        .app-container { --primary-color: #111827; }
        .app-header { background: linear-gradient(135deg, #111827 0%, #1F2937 100%); color: white; }
        .app-header h1 { color: white; }
        
        .section-divider {
            font-size: 0.85rem;
            font-weight: 700;
            color: #6B7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #E5E7EB;
        }
        
        .row {
            display: flex;
            gap: 1rem;
        }
        
        .col {
            flex: 1;
        }
        
        .upload-area {
            border: 2px dashed #D1D5DB;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #F9FAFB;
        }
        
        .upload-area:hover {
            border-color: #9CA3AF;
            background: #F3F4F6;
        }
        
        .upload-preview {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #10B981;
            font-weight: 600;
        }
        
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #111827 0%, #374151 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            box-shadow: 0 4px 15px rgba(17, 24, 39, 0.3);
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .info-text {
            font-size: 0.8rem;
            color: #9CA3AF;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header">
        <a href="admin.html" class="back-arrow" onclick="navigateTo('admin.html'); return false;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <h1>Coupon erstellen</h1>
        <div style="width: 40px;"></div>
    </header>

    <main class="app-content">
        <form id="createCouponForm">
            
            <!-- DEAL INFOS -->
            <div class="section-divider">🎟️ Deal Informationen</div>
            
            <div class="form-group">
                <label>Hintergrundbild</label>
                <div class="upload-area" onclick="document.getElementById('imgInput').click()">
                    <div id="previewContainer">
                        <div style="font-size: 2rem; margin-bottom: 0.5rem;">📷</div>
                        <div>Klicken zum Hochladen</div>
                        <div class="info-text">Empfohlen: 600x400px</div>
                    </div>
                </div>
                <input type="file" id="imgInput" accept="image/*" style="display:none">
            </div>
            
            <div class="form-group">
                <label>Titel (Deal) *</label>
                <input type="text" id="title" required placeholder="z.B. 2 für 1 Kaffee">
            </div>
            
            <div class="row">
                <div class="col form-group">
                    <label>Rabatt-Badge *</label>
                    <input type="text" id="discountValue" required placeholder="-20% oder GRATIS">
                </div>
                <div class="col form-group">
                    <label>Code *</label>
                    <input type="text" id="code" required style="text-transform:uppercase;" placeholder="DEAL2025">
                </div>
            </div>

            <div class="form-group">
                <label>Kategorie</label>
                <select id="category">
                    <option value="food">🍕 Essen & Trinken</option>
                    <option value="tech">💻 Technik</option>
                    <option value="fashion">👕 Mode</option>
                    <option value="leisure">🎮 Freizeit</option>
                    <option value="beauty">💅 Beauty & Wellness</option>
                    <option value="education">📚 Bildung</option>
                </select>
            </div>

            <div class="form-group">
                <label>Beschreibung *</label>
                <textarea id="description" rows="3" required placeholder="Was beinhaltet der Deal? Welche Bedingungen gibt es?"></textarea>
            </div>
            
            <div class="form-group">
                <label>Gültig bis</label>
                <input type="date" id="validUntil">
            </div>

            <!-- PARTNER INFOS -->
            <div class="section-divider">🏪 Partner Informationen</div>
            
            <div class="form-group">
                <label>Partner Logo</label>
                <div class="upload-area" onclick="document.getElementById('logoInput').click()" style="padding: 1rem;">
                    <div id="logoPreview">
                        <span style="font-size: 1.5rem;">🏢</span> Logo hochladen (optional)
                    </div>
                </div>
                <input type="file" id="logoInput" accept="image/*" style="display:none">
            </div>
            
            <div class="form-group">
                <label>Firmenname *</label>
                <input type="text" id="businessName" required placeholder="z.B. Campus Café">
            </div>
            
            <div class="form-group">
                <label>Kurzbeschreibung des Partners</label>
                <input type="text" id="businessDesc" placeholder="z.B. Gemütliches Café direkt am Campus">
            </div>
            
            <div class="row">
                <div class="col form-group">
                    <label>Stadt *</label>
                    <input type="text" id="city" required placeholder="München" list="citySuggestions" autocomplete="address-level2">
                    <datalist id="citySuggestions"></datalist>
                </div>
                <div class="col form-group">
                    <label>PLZ</label>
                    <input type="text" id="zipCode" placeholder="80333">
                </div>
            </div>
            
            <div class="form-group">
                <label>Straße & Hausnummer</label>
                <input type="text" id="address" placeholder="Musterstraße 123">
            </div>
            
            <div class="form-group">
                <label>Webseite</label>
                <input type="url" id="website" placeholder="https://www.beispiel.de">
            </div>
            
            <div class="form-group">
                <label>Instagram</label>
                <input type="text" id="instagram" placeholder="@beispiel_cafe">
            </div>
            
            <div class="form-group">
                <label>Öffnungszeiten</label>
                <input type="text" id="openingHours" placeholder="Mo-Fr: 8-18 Uhr, Sa: 10-16 Uhr">
            </div>
            
            <div class="form-group">
                <label>Telefon</label>
                <input type="tel" id="phone" placeholder="+49 123 456789">
            </div>

            <button type="button" class="submit-btn" id="previewBtn" style="background: linear-gradient(135deg, #F59E0B 0%, #EA580C 100%); box-shadow: 0 4px 15px rgba(245,158,11,0.3); margin-top: 1.5rem;" onclick="showPreview()">Vorschau anzeigen</button>
            <button type="submit" class="submit-btn" id="submitBtn">Coupon Veröffentlichen</button>
        </form>
    </main>
</div>

<!-- VORSCHAU MODAL -->
<div id="previewModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:99999; overflow-y:auto; backdrop-filter:blur(4px);">
    <div style="padding: 1rem; max-width: 500px; margin: 2rem auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
            <h3 style="margin:0; color:white; font-size:1.1rem;">Vorschau</h3>
            <button onclick="closePreview()" style="background:rgba(255,255,255,0.2); border:none; width:36px; height:36px; border-radius:50%; color:white; font-size:1.3rem; cursor:pointer;">&times;</button>
        </div>
        <div id="previewContent"></div>
    </div>
</div>

<script src="lib/supabase.min.js"></script>
<script src="config.js"></script>
<script src="translations.js"></script>
<script src="session-cache.js"></script>
<script src="room8-ui.js"></script>
<script>
    // Supabase Client - Direkte Initialisierung
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function navigateTo(url) {
        try { window.location.href = url; } catch(e) { console.warn("Nav Error:", e); }
    }

    async function checkAdmin() {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) {
            Room8UI.error("Nicht eingeloggt!");
            setTimeout(function() { navigateTo('login.html'); }, 1500);
            return null;
        }
        const { data: profile, error } = await sb.from('profiles').select('is_admin').eq('id', user.id).maybeSingle();
        if (error || !profile || profile.is_admin !== true) {
            Room8UI.error("Kein Admin-Zugriff!");
            setTimeout(function() { navigateTo('dashboard.html'); }, 1500);
            return null;
        }
        return user;
    }

    // Image Preview mit Bildvorschau
    const fileInput = document.getElementById('imgInput');
    fileInput.addEventListener('change', (e) => {
        if(e.target.files[0]) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('previewContainer').innerHTML = `
                    <img src="${event.target.result}" alt="Coupon-Bild Vorschau" style="max-width:200px; max-height:150px; border-radius:12px; margin-bottom:0.5rem; object-fit:cover;">
                    <div style="color:#10B981; font-weight:600;">✅ ${file.name}</div>
                `;
            };
            reader.readAsDataURL(file);
        }
    });

    // Logo Preview mit Bildvorschau
    const logoInput = document.getElementById('logoInput');
    logoInput.addEventListener('change', (e) => {
        if(e.target.files[0]) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('logoPreview').innerHTML = `
                    <img src="${event.target.result}" alt="Logo Vorschau" style="max-width:80px; max-height:80px; border-radius:12px; margin-bottom:0.5rem;">
                    <div style="color:#10B981; font-weight:600;">✅ ${file.name}</div>
                `;
            };
            reader.readAsDataURL(file);
        }
    });

    // === VORSCHAU ===
    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    window.showPreview = function() {
        var title = document.getElementById('title').value || 'Deal-Titel';
        var discount = document.getElementById('discountValue').value || '--%';
        var code = (document.getElementById('code').value || 'CODE').toUpperCase();
        var category = document.getElementById('category').value;
        var desc = document.getElementById('description').value || 'Beschreibung des Deals...';
        var validUntil = document.getElementById('validUntil').value;
        var businessName = document.getElementById('businessName').value || 'Firmenname';
        var city = document.getElementById('city').value || 'Stadt';
        var zipCode = document.getElementById('zipCode').value;
        var address = document.getElementById('address').value;
        var website = document.getElementById('website').value;
        var instagram = document.getElementById('instagram').value;
        var openingHours = document.getElementById('openingHours').value;

        var validText = validUntil ? new Date(validUntil).toLocaleDateString('de-DE') : 'Unbegrenzt';
        var locationText = city + (address ? ', ' + address : '');

        // Bild-Vorschau
        var imgPreview = '';
        var imgFile = document.getElementById('imgInput').files[0];
        if (imgFile) {
            var imgEl = document.querySelector('#previewContainer img');
            if (imgEl) imgPreview = imgEl.src;
        }
        var bgStyle = imgPreview
            ? 'background-image:url(' + imgPreview + '); background-size:cover; background-position:center;'
            : 'background: linear-gradient(135deg, #F59E0B 0%, #EA580C 100%);';

        // Logo-Vorschau
        var logoHtml = '🏪';
        var logoFile = document.getElementById('logoInput').files[0];
        if (logoFile) {
            var logoEl = document.querySelector('#logoPreview img');
            if (logoEl) logoHtml = '<img src="' + logoEl.src + '" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">';
        }

        // Category Emoji
        var catEmojis = { food: '🍕', tech: '💻', fashion: '👕', leisure: '🎮', beauty: '💅', education: '📚' };
        var catEmoji = catEmojis[category] || '🎟️';

        // Partner Details
        var detailsHtml = '';
        if (openingHours || website || instagram) {
            detailsHtml = '<div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.75rem;">';
            if (openingHours) detailsHtml += '<span style="background:#F3F4F6;padding:0.25rem 0.5rem;border-radius:6px;font-size:0.75rem;color:#4B5563;">🕐 ' + escapeHtml(openingHours) + '</span>';
            if (website) detailsHtml += '<span style="background:#F3F4F6;padding:0.25rem 0.5rem;border-radius:6px;font-size:0.75rem;color:#4B5563;">🌐 ' + escapeHtml(website) + '</span>';
            if (instagram) detailsHtml += '<span style="background:#F3F4F6;padding:0.25rem 0.5rem;border-radius:6px;font-size:0.75rem;color:#4B5563;">📸 ' + escapeHtml(instagram) + '</span>';
            detailsHtml += '</div>';
        }

        document.getElementById('previewContent').innerHTML =
            '<div style="background:white;border-radius:16px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.2);">' +
                '<div style="height:160px;position:relative;' + bgStyle + '">' +
                    (!imgPreview ? '<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3rem;opacity:0.3;">' + catEmoji + '</span>' : '') +
                    '<span style="position:absolute;bottom:12px;left:12px;background:linear-gradient(135deg,#F59E0B 0%,#EA580C 100%);color:white;font-weight:800;padding:0.5rem 0.85rem;border-radius:10px;font-size:0.95rem;box-shadow:0 4px 12px rgba(245,158,11,0.4);">' + escapeHtml(discount) + '</span>' +
                '</div>' +
                '<div style="padding:1.25rem 1rem 1rem;">' +
                    '<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;">' +
                        '<div style="width:44px;height:44px;border-radius:10px;background:#F3F4F6;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;">' + logoHtml + '</div>' +
                        '<div style="flex:1;min-width:0;">' +
                            '<h4 style="font-weight:700;font-size:1rem;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(businessName) + '</h4>' +
                            '<div style="font-size:0.8rem;color:#9CA3AF;">📍 ' + escapeHtml(locationText) + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div style="font-size:1.1rem;font-weight:700;margin:0 0 0.5rem 0;">' + escapeHtml(title) + '</div>' +
                    '<div style="font-size:0.85rem;color:#6B7280;margin-bottom:0.75rem;line-height:1.4;">' + escapeHtml(desc) + '</div>' +
                    detailsHtml +
                    '<div style="display:flex;justify-content:space-between;align-items:center;border-top:1px dashed #E5E7EB;padding-top:0.75rem;">' +
                        '<span style="font-size:0.8rem;color:#9CA3AF;">Gültig bis ' + validText + '</span>' +
                        '<span style="background:linear-gradient(135deg,#F59E0B 0%,#EA580C 100%);color:white;border:none;padding:0.6rem 1.25rem;border-radius:10px;font-weight:600;font-size:0.9rem;">Code: ' + escapeHtml(code) + '</span>' +
                    '</div>' +
                '</div>' +
            '</div>';

        document.getElementById('previewModal').style.display = 'block';
    };

    window.closePreview = function() {
        document.getElementById('previewModal').style.display = 'none';
    };

    document.getElementById('previewModal').addEventListener('click', function(e) {
        if (e.target === document.getElementById('previewModal')) closePreview();
    });

    document.getElementById('createCouponForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = await checkAdmin();
        if (!user) return;
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Wird erstellt...';

        try {
            const data = {
                user_id: user.id,
                business_name: document.getElementById('businessName').value,
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                discount_value: document.getElementById('discountValue').value,
                discount_code: document.getElementById('code').value.toUpperCase(),
                valid_until: document.getElementById('validUntil').value || null,
                description: document.getElementById('description').value,
                city: (typeof normalizeCity === 'function' ? normalizeCity(document.getElementById('city').value) : document.getElementById('city').value.trim()),
                status: 'active'
            };

            const { data: coupon, error } = await sb.from('coupons').insert(data).select().single();
            if (error) throw error;

            // Hauptbild hochladen (mit Browser-Compression)
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const compressed = (window.Room8 && Room8.compressImage) ? await Room8.compressImage(file) : file;
                const path = `coupons/${coupon.id}_img.jpg`;
                await sb.storage.from('listing-images').upload(path, compressed);
                await sb.from('coupon_photos').insert({ coupon_id: coupon.id, storage_path: path, photo_type: 'cover' });
            }

            // Logo hochladen (mit Browser-Compression, kleiner maxDim)
            if (logoInput.files.length > 0) {
                const file = logoInput.files[0];
                const compressed = (window.Room8 && Room8.compressImage) ? await Room8.compressImage(file, { maxDim: 400, quality: 0.85 }) : file;
                const path = `coupons/${coupon.id}_logo.jpg`;
                await sb.storage.from('listing-images').upload(path, compressed);
                await sb.from('coupon_photos').insert({ coupon_id: coupon.id, storage_path: path, photo_type: 'logo' });
            }

            Room8UI.success("Coupon erfolgreich erstellt!");

            // Benachrichtige User die diese Stadt in ihren Notification-Settings eingestellt haben
            if (coupon.city && window.NotificationHelpers) {
                try {
                    var citySettingsRes = await sb
                        .from('notification_settings')
                        .select('user_id, new_coupon_city')
                        .ilike('notification_city', coupon.city);

                    if (citySettingsRes.data && citySettingsRes.data.length > 0) {
                        for (var u of citySettingsRes.data) {
                            if (u.user_id === user.id) continue;
                            if (u.new_coupon_city === false) continue;

                            await NotificationHelpers.createNotification(
                                u.user_id,
                                'new_coupon_city',
                                '\uD83C\uDF9F\uFE0F Neuer Coupon in ' + coupon.city,
                                coupon.title,
                                'coupon-detail.html?id=' + coupon.id,
                                coupon.id
                            );
                        }
                    }
                } catch (notifyErr) {
                    console.log('Coupon city notification error:', notifyErr);
                }
            }

            setTimeout(function() { navigateTo("admin.html"); }, 1500);
        } catch (err) {
            Room8UI.error("Fehler: " + err.message);
            btn.disabled = false;
            btn.textContent = 'Coupon Veröffentlichen';
        }
    });

    // Admin Check beim Laden
    checkAdmin();
</script>
<script src="notificationHelpers.js"></script>
<script src="notificationBell.js"></script>
<script src="cities.js"></script>
<script>document.addEventListener('DOMContentLoaded', function(){ if (typeof populateCityDatalist === 'function') populateCityDatalist('citySuggestions'); });</script>
</body>
</html>
