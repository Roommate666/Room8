// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    // Dependency-Konflikt-Fix fuer ALLE Module (inkl. capgo-capacitor-social-login):
    // Das Plugin zieht androidx.browser 1.9.0 (verlangt compileSdk 36/AGP 8.9.1),
    // waehrend androidbrowserhelper strikt 1.4.0 pinnt. 1.8.0 loest beides und
    // bleibt mit compileSdk 35 / AGP 8.7.2 kompatibel.
    configurations.all {
        resolutionStrategy {
            force 'androidx.browser:browser:1.8.0'
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
